<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Ordini fornitori – Aquarius</title></head>
<body><section>

    <div th:replace="~{fragments/page-header :: pageHeader(
        icon='bi-cart-plus',
        title='Ordini a fornitore',
        subtitle='Consultazione ordini di acquisto — anno ' + ${currentFiscalYear} + ' (tabelle U_ORF_TT / U_ORF_DD)',
        crumbs=${breadcrumbs}
    )}"></div>

    <form method="get" th:action="@{/ordini-fornitore}" class="mb-3">
        <input type="hidden" name="size" th:value="${size}">
        <input type="hidden" name="sort" th:value="${sort}">
        <input type="hidden" name="dir" th:value="${dir}">
        <div class="input-group" style="max-width:600px">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" name="q" th:value="${q}" class="form-control"
                   placeholder="Numero, fornitore o riferimento…">
            <button type="submit" class="btn btn-primary">Cerca</button>
            <a th:href="@{/ordini-fornitore}" class="btn btn-outline-secondary" th:if="${q != null and q != ''}">
                <i class="bi bi-x"></i>
            </a>
        </div>
    </form>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-sm mb-0">
                    <thead class="table-light">
                        <tr>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/ordini-fornitore','orderNumber','Numero',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/ordini-fornitore','orderDate','Data',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/ordini-fornitore','supplierCode','Fornitore',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/ordini-fornitore','supplierName','Ragione sociale',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/ordini-fornitore','deliveryDate','Consegna',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/ordini-fornitore','taxableAmount','Imponibile',${q},${size},${sort},${dir},'text-end')}"></th>
                            <th>Stato</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="o : ${orders.content}">
                            <td>
                                <a th:href="@{/ordini-fornitore/{id}(id=${o.id})}"
                                   class="font-monospace small text-decoration-none"
                                   th:text="${o.orderNumber != null ? o.orderNumber.trim() : ''}">000123</a>
                            </td>
                            <td class="small"><span th:replace="~{fragments/list-tools :: itDate(${o.orderDate})}"></span></td>
                            <td class="font-monospace small" th:text="${o.supplierCode != null ? o.supplierCode.trim() : '—'}">FOR001</td>
                            <td>
                                <a th:href="@{/ordini-fornitore/{id}(id=${o.id})}"
                                   class="text-decoration-none text-dark"
                                   th:text="${o.supplierName ?: '—'}">Fornitore S.r.l.</a>
                            </td>
                            <td class="small" th:text="${o.deliveryDate != null and !o.deliveryDate.trim().isEmpty() ? o.deliveryDate.trim() : '—'}">—</td>
                            <td class="text-end font-monospace small"
                                th:text="${o.taxableAmount != null ? #numbers.formatDecimal(o.taxableAmount, 1, 'POINT', 2, 'COMMA') : '—'}">0,00</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${o.statusLabel == 'Chiuso'} ? 'bg-secondary-subtle text-secondary-emphasis' : 'bg-success-subtle text-success-emphasis'"
                                      th:text="${o.statusLabel}">Aperto</span>
                            </td>
                        </tr>
                        <tr th:if="${orders.empty}">
                            <td colspan="7" class="text-center text-muted py-5">
                                <i class="bi bi-inbox" style="font-size:2rem"></i>
                                <p class="mt-2 mb-0">Nessun ordine fornitore trovato per questo anno.</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/list-tools :: pager('/ordini-fornitore',${orders.number},${q},${size},${sort},${dir},${orders})}"></div>

</section></body>
</html>
