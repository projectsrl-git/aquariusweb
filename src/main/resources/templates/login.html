<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquarius – Login</title>
    <link rel="icon" type="image/jpeg" th:href="@{/img/aquarius-icon.jpg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0c4a6e 0%, #075985 50%, #0c4a6e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .login-card {
            width: 440px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.4);
            background: #fff;
            overflow: hidden;
        }
        .login-logo {
            background: #0c4a6e;
            padding: 2.25rem 2rem 1.5rem;
            text-align: center;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .8rem;
        }
        .login-logo img {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0,0,0,.35);
        }
        .login-logo h1 {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -1px;
            line-height: 1;
        }
        .login-logo p {
            margin: 0;
            opacity: 0.65;
            font-size: 0.7rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
        }
        .btn-login {
            background: #0c4a6e;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.75rem;
            border-radius: 8px;
            transition: all 0.2s;
            width: 100%;
        }
        .btn-login:hover { opacity: 0.92; color: white; background: #075985; }
        .form-control:focus, .form-select:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14,165,233,0.15);
        }
        .form-label { font-weight: 600; font-size: 0.85rem; color: #475569; }
        .footer-note { font-size: 0.75rem; color: #94a3b8; text-align: center; margin-top: 1.5rem; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">
        <img th:src="@{/img/aquarius-icon.jpg}" alt="">
        <h1>Aquarius</h1>
        <p>ERP · Web Edition</p>
    </div>

    <div class="p-4">
        <div th:if="${param.error}" class="alert alert-danger py-2 mb-3 small">
            <i class="bi bi-exclamation-triangle me-2"></i>Credenziali non valide o società non selezionata.
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2 mb-3 small">
            <i class="bi bi-check-circle me-2"></i>Disconnessione effettuata.
        </div>

        <form th:action="@{/login}" method="post">

            <!-- SOCIETÀ: replica della comboSocieta di PASS.SCX -->
            <div class="mb-3">
                <label class="form-label">Società</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-building"></i></span>
                    <select name="tenant" class="form-select" required>
                        <option th:each="t : ${tenants}"
                                th:value="${t.tenantId}"
                                th:text="${t.displayName}"
                                th:selected="${t.tenantId == defaultTenantId}"></option>
                    </select>
                </div>
            </div>

            <!-- OPERATORE: replica di V_codope -->
            <div class="mb-3">
                <label class="form-label">Operatore</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control"
                           placeholder="codice operatore" autocomplete="username" autofocus required>
                </div>
            </div>

            <!-- PASSWORD: replica di V_pass -->
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control"
                           placeholder="••••••••" autocomplete="current-password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-login mt-2">
                <i class="bi bi-box-arrow-in-right me-2"></i>Continua
            </button>
        </form>

        <div class="footer-note">
            Aquarius v<span th:text="${appVersion}">0.0.0</span>
            <span class="text-muted">·</span>
            <span th:text="${currentYear}">2026</span>
        </div>
    </div>
</div>
</body>
</html>
