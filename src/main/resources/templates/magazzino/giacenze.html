<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Giacenze – Aquarius</title></head>
<body><section th:with="base=${'/magazzino/giacenze?tutte=' + tutte + (q != '' ? '&q=' + q : '')}">

    <div th:replace="~{fragments/page-header :: pageHeader(
        icon='bi-boxes',
        title='Situazione giacenze di magazzino',
        subtitle='Giacenze correnti aggregate per articolo e magazzino (tabella U_MAG_GG, somma delle righe con segno)',
        crumbs=${breadcrumbs}
    )}"></div>

    <form method="get" th:action="@{/magazzino/giacenze}" class="mb-3">
        <input type="hidden" name="size" th:value="${size}">
        <input type="hidden" name="sort" th:value="${sort}">
        <input type="hidden" name="dir" th:value="${dir}">
        <div class="d-flex flex-wrap gap-3 align-items-center">
            <div class="input-group" style="max-width:520px">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" name="q" th:value="${q}" class="form-control"
                       placeholder="Articolo, descrizione o magazzino…">
                <button type="submit" class="btn btn-primary">Cerca</button>
                <a th:href="@{/magazzino/giacenze}" class="btn btn-outline-secondary" th:if="${q != null and q != ''}">
                    <i class="bi bi-x"></i>
                </a>
            </div>
            <div class="form-check form-switch mb-0">
                <input class="form-check-input" type="checkbox" id="chkTutte" name="tutte" value="true"
                       th:checked="${tutte}" onchange="this.form.submit()">
                <label class="form-check-label small" for="chkTutte">
                    Mostra anche giacenze a zero (righe storiche residue)
                </label>
            </div>
        </div>
    </form>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-sm mb-0"
                       th:with="flip=${dir == 'asc' ? 'desc' : 'asc'}, tail=${'&size=' + size + '&page=0'}">
                    <thead class="table-light">
                        <tr>
                            <th style="white-space:nowrap"><a class="text-decoration-none text-reset"
                                th:href="@{${base + tail + '&sort=ARTICOLO&dir=' + (sort == 'ARTICOLO' ? flip : 'asc')}}">Articolo
                                <i class="bi" th:classappend="${sort == 'ARTICOLO' ? (dir == 'asc' ? 'bi-caret-up-fill' : 'bi-caret-down-fill') : 'bi-arrow-down-up opacity-25'}" style="font-size:.7rem"></i></a></th>
                            <th>Descrizione</th>
                            <th style="white-space:nowrap"><a class="text-decoration-none text-reset"
                                th:href="@{${base + tail + '&sort=MAGAZZINO&dir=' + (sort == 'MAGAZZINO' ? flip : 'asc')}}">Magazzino
                                <i class="bi" th:classappend="${sort == 'MAGAZZINO' ? (dir == 'asc' ? 'bi-caret-up-fill' : 'bi-caret-down-fill') : 'bi-arrow-down-up opacity-25'}" style="font-size:.7rem"></i></a></th>
                            <th class="text-end" style="white-space:nowrap"><a class="text-decoration-none text-reset"
                                th:href="@{${base + tail + '&sort=GIACENZA&dir=' + (sort == 'GIACENZA' ? flip : 'asc')}}">Giacenza
                                <i class="bi" th:classappend="${sort == 'GIACENZA' ? (dir == 'asc' ? 'bi-caret-up-fill' : 'bi-caret-down-fill') : 'bi-arrow-down-up opacity-25'}" style="font-size:.7rem"></i></a></th>
                            <th class="text-end">Righe</th>
                            <th>Stato</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="g : ${giacenze.content}">
                            <td>
                                <a th:href="@{/articoli(q=${g.articleCode != null ? g.articleCode.trim() : ''})}"
                                   class="font-monospace small text-decoration-none"
                                   th:text="${g.articleCode != null ? g.articleCode.trim() : ''}">ART001</a>
                            </td>
                            <td class="small" th:text="${g.articleDescription ?: '—'}">Descrizione</td>
                            <td class="font-monospace small" th:text="${g.warehouseCode != null and !g.warehouseCode.trim().isEmpty() ? g.warehouseCode.trim() : '—'}">01</td>
                            <td class="text-end font-monospace small"
                                th:classappend="${g.isNegative()} ? 'text-danger fw-semibold' : ''"
                                th:text="${g.totalQuantity != null ? #numbers.formatDecimal(g.totalQuantity, 1, 'POINT', 2, 'COMMA') : '—'}">10,00</td>
                            <td class="text-end small text-muted" th:text="${g.rowCount}">3</td>
                            <td>
                                <span class="badge bg-danger-subtle text-danger-emphasis" th:if="${g.isNegative()}">Negativa</span>
                                <span class="badge bg-warning-subtle text-warning-emphasis" th:if="${g.isZeroWithHistory()}"
                                      title="Giacenza a zero ma righe storiche presenti in U_MAG_GG">Zero con storico</span>
                            </td>
                        </tr>
                        <tr th:if="${giacenze.empty}">
                            <td colspan="6" class="text-center text-muted py-5">
                                <i class="bi bi-inbox" style="font-size:2rem"></i>
                                <p class="mt-2 mb-0">Nessuna giacenza trovata con i filtri impostati.</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">
        <span class="small text-muted" th:text="${'Righe per pagina: ' + size + ' · ' + giacenze.totalElements + ' totali'}"></span>
        <ul class="pagination pagination-sm mb-0" th:if="${giacenze.totalPages > 1}"
            th:with="tail=${'&size=' + size + '&sort=' + sort + '&dir=' + dir}">
            <li class="page-item" th:classappend="${giacenze.first ? 'disabled' : ''}">
                <a class="page-link" th:href="@{${base + tail + '&page=0'}}">«</a>
            </li>
            <li class="page-item" th:classappend="${giacenze.first ? 'disabled' : ''}">
                <a class="page-link" th:href="@{${base + tail + '&page=' + (giacenze.number - 1)}}">‹</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link" th:text="${'Pagina ' + (giacenze.number + 1) + ' di ' + giacenze.totalPages}"></span>
            </li>
            <li class="page-item" th:classappend="${giacenze.last ? 'disabled' : ''}">
                <a class="page-link" th:href="@{${base + tail + '&page=' + (giacenze.number + 1)}}">›</a>
            </li>
            <li class="page-item" th:classappend="${giacenze.last ? 'disabled' : ''}">
                <a class="page-link" th:href="@{${base + tail + '&page=' + (giacenze.totalPages - 1)}}">»</a>
            </li>
        </ul>
    </div>

</section></body>
</html>
