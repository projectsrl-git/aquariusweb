<!DOCTYPE html>
<html lang="it"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <!-- Context path esposto al JS: sotto Tomcat l'app vive in /aquariusweb,
         quindi le fetch() con path assoluto vanno prefissate con questo. -->
    <meta name="_ctx" th:content="@{/}"/>
    <title th:replace="${title}">Aquarius</title>
    <link rel="icon" type="image/jpeg" th:href="@{/img/aquarius-icon.jpg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --aq-blue: #0ea5e9;
            --aq-dark: #0c4a6e;
            --aq-darker: #082f49;
            --aq-primary: #0c4a6e;
            --aq-menu: #e0f2fe;
            --sidebar-w: 260px;
            --sidebar-w-collapsed: 64px;
        }
        body { background: #f4f6fb; font-family: 'Segoe UI', system-ui, sans-serif; }

        #sidebar {
            width: var(--sidebar-w); min-height: 100vh; background: var(--aq-dark);
            position: fixed; top: 0; left: 0; z-index: 1000;
            display: flex; flex-direction: column;
            transition: width .2s ease;
        }
        .sidebar-brand {
            padding: 1.15rem 1.2rem .9rem;
            border-bottom: 1px solid rgba(255,255,255,.1);
            background: var(--aq-darker);
            display: flex;
            align-items: center;
            gap: .7rem;
            position: relative;
        }
        .sidebar-toggle {
            margin-left: auto;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.15);
            color: rgba(255,255,255,.7);
            width: 26px; height: 26px;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
            transition: all .12s ease;
        }
        .sidebar-toggle:hover { background: rgba(255,255,255,.18); color: white; }
        .sidebar-toggle i { font-size: .8rem; transition: transform .2s ease; }
        .sidebar-brand .brand-icon {
            width: 38px; height: 38px;
            border-radius: 9px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,.3);
        }
        .sidebar-brand .brand-text { display: flex; flex-direction: column; line-height: 1.1; }
        .sidebar-brand .brand-text strong {
            color: white;
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: -.5px;
        }
        .sidebar-brand .brand-text small {
            color: rgba(255,255,255,.45);
            font-size: .55rem;
            letter-spacing: 2px; text-transform: uppercase;
            margin-top: .12rem;
        }
        .sidebar-nav { padding: .5rem 0; flex: 1; overflow-y: auto; }
        .sidebar-nav::-webkit-scrollbar { width: 6px; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 3px; }

        /* Menu tree styles */
        .menu-item {
            color: rgba(255,255,255,.85);
            display: flex; align-items: center;
            padding: .5rem 1rem .5rem 1.25rem;
            font-size: .88rem;
            cursor: pointer;
            text-decoration: none;
            user-select: none;
            border-left: 3px solid transparent;
        }
        .menu-item:hover {
            background: rgba(255,255,255,.05);
            color: white; border-left-color: var(--aq-blue);
        }
        .menu-item.active { background: rgba(255,255,255,.1); border-left-color: var(--aq-blue); }
        .menu-item .menu-icon {
            width: 1.3rem; flex-shrink: 0;
            font-size: .95rem; text-align: center;
        }
        .menu-item .menu-label { flex: 1; }
        .menu-item .menu-chevron {
            font-size: .7rem;
            transition: transform .15s;
            opacity: .5;
        }
        .menu-item.open .menu-chevron { transform: rotate(90deg); }
        .menu-item.disabled { opacity: .35; cursor: not-allowed; }
        .menu-item.disabled:hover { background: none; border-left-color: transparent; color: rgba(255,255,255,.85); }
        .menu-children { display: none; }
        .menu-children.open { display: block; }
        /* Indent annidato */
        .menu-children .menu-item        { padding-left: 2.5rem; font-size: .82rem; }
        .menu-children .menu-children .menu-item     { padding-left: 3.5rem; }
        .menu-children .menu-children .menu-children .menu-item { padding-left: 4.5rem; }

        .menu-separator {
            height: 1px; background: rgba(255,255,255,.08);
            margin: .35rem 1rem;
        }
        .menu-not-implemented {
            font-size: .68rem; opacity: .5;
            margin-left: .4rem;
        }

        /* Static section (Strumenti) below tree */
        .nav-static-section {
            padding: .55rem 1.25rem .15rem;
            font-size: .6rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--aq-menu); opacity: 0.6;
            margin-top: .5rem;
        }

        /* ── Blocco identità in alto (tenant + user + anno) ─────────────── */
        .sidebar-identity {
            padding: .7rem 1rem .75rem;
            border-bottom: 1px solid rgba(255,255,255,.1);
            background: rgba(0,0,0,.12);
            display: flex; flex-direction: column; gap: .3rem;
        }
        .sidebar-identity .ident-tenant {
            color: white; font-weight: 600; font-size: .85rem;
            display: flex; align-items: center; gap: .4rem;
        }
        .sidebar-identity .ident-user {
            color: rgba(255,255,255,.6); font-size: .72rem;
            display: flex; align-items: center; gap: .4rem;
        }
        .sidebar-identity .ident-tenant i,
        .sidebar-identity .ident-user i { width: 1rem; text-align: center; flex-shrink: 0; }

        .sidebar-foot {
            padding: .8rem 1rem;
            border-top: 1px solid rgba(255,255,255,.1);
            color: rgba(255,255,255,.6); font-size: .72rem;
        }
        .sidebar-foot .app-version {
            margin-top: .65rem;
            padding-top: .55rem;
            border-top: 1px solid rgba(255,255,255,.08);
            color: rgba(255,255,255,.4);
            font-size: .65rem;
            letter-spacing: .5px;
            font-family: 'Menlo', 'Consolas', monospace;
            text-align: center;
            cursor: help;
        }
        main.content {
            margin-left: var(--sidebar-w);
            padding: 1.5rem 2rem;
            transition: margin-left .2s ease;
        }
        .page-header { border-bottom: 1px solid #e2e8f0; padding-bottom: 1rem; margin-bottom: 1.5rem; }
        .page-header h1 { font-size: 1.5rem; font-weight: 600; margin: 0; color: #0c4a6e; }
        .page-header .breadcrumb { font-size: .85rem; color: #64748b; margin-top: .25rem; }

        .menu-loading { padding: 2rem 1rem; text-align: center; color: rgba(255,255,255,.4); font-size: .85rem; }
        .menu-spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,.2);
            border-top-color: rgba(255,255,255,.8);
            border-radius: 50%; animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Fiscal year badge in sidebar footer ────────────────────────── */
        .fiscal-year-badge {
            display: flex;
            align-items: center;
            gap: .3rem;
            padding: .4rem .65rem;
            margin-top: .5rem;
            font-size: .75rem;
            font-weight: 600;
            color: rgba(255,255,255,.9);
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.15);
            border-radius: .35rem;
            text-decoration: none;
            transition: all .12s ease;
        }
        .fiscal-year-badge:hover {
            background: rgba(255,255,255,.15);
            color: white;
            border-color: rgba(255,255,255,.3);
        }
        .fiscal-year-badge .bi-chevron-right { opacity: .5; font-size: .65rem; }

        /* ══ Modalità COMPRESSA (solo icone) ═══════════════════════════════ */
        #sidebar.collapsed { width: var(--sidebar-w-collapsed); }
        #sidebar.collapsed + main.content,
        body.sidebar-collapsed main.content { margin-left: var(--sidebar-w-collapsed); }

        /* Nascondi tutte le etichette testuali quando compressa */
        #sidebar.collapsed .brand-text,
        #sidebar.collapsed .menu-label,
        #sidebar.collapsed .ident-label,
        #sidebar.collapsed .nav-static-section,
        #sidebar.collapsed .menu-chevron,
        #sidebar.collapsed .menu-not-implemented { display: none; }

        /* Brand: centra il logo, ruota la freccia del toggle */
        #sidebar.collapsed .sidebar-brand { padding: 1.15rem 0 .9rem; justify-content: center; }
        #sidebar.collapsed .sidebar-toggle {
            margin-left: 0;
            position: absolute; bottom: -13px; right: 8px;
            background: var(--aq-dark);
        }
        #sidebar.collapsed .sidebar-toggle i { transform: rotate(180deg); }

        /* Identità: solo icone centrate */
        #sidebar.collapsed .sidebar-identity { padding: .6rem 0; align-items: center; }
        #sidebar.collapsed .sidebar-identity .ident-tenant,
        #sidebar.collapsed .sidebar-identity .ident-user { justify-content: center; gap: 0; }
        #sidebar.collapsed .fiscal-year-badge {
            justify-content: center; padding: .4rem 0; margin-top: .4rem;
            width: 40px; margin-left: auto; margin-right: auto;
        }

        /* Voci di menu: icona centrata, niente padding-left dell'indent */
        #sidebar.collapsed .menu-item { padding: .55rem 0; justify-content: center; }
        #sidebar.collapsed .menu-item .menu-icon { width: auto; font-size: 1.05rem; }
        #sidebar.collapsed .menu-children .menu-item { padding-left: 0; }
        /* I sottomenu annidati non hanno senso da compressi: mostra solo il 1o livello */
        #sidebar.collapsed .menu-children { display: none !important; }

        /* Footer: solo icona Esci */
        #sidebar.collapsed .sidebar-foot { padding: .8rem .3rem; }
        #sidebar.collapsed .app-version { display: none; }

        /* ── Dashboard valorizzazione magazzino ─────────────────────────── */
        .vz-filter-bar {
            position: sticky; top: 0; z-index: 20;
            background: white; border: 1px solid #dee2e6; border-radius: .5rem;
            padding: .75rem 1rem; margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,.04);
        }
        .vz-asof {
            font-size: .82rem; color: #334155;
            background: #f0f9ff; border: 1px solid #bae6fd; border-radius: .4rem;
            padding: .5rem .85rem; margin-bottom: 1rem;
        }
        .kpi-card {
            background: white; border: 1px solid #e2e8f0; border-radius: .5rem;
            padding: .85rem 1rem; height: 100%;
        }
        .kpi-card .kpi-label { font-size: .68rem; color: #64748b;
            text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .kpi-card .kpi-value { font-size: 1.35rem; font-weight: 700; color: #0f172a;
            font-variant-numeric: tabular-nums; }
        .kpi-card .kpi-sub { font-size: .7rem; color: #94a3b8; }
        .kpi-good  .kpi-value { color: #15803d; }
        .kpi-warn  .kpi-value { color: #b45309; }
        .kpi-bad   .kpi-value { color: #b91c1c; }
        .stato-badge { font-size: .65rem; font-weight: 700; padding: .18rem .5rem;
            border-radius: .3rem; border: 1px solid transparent; white-space: nowrap; }
        .stato-OK { background:#dcfce7; color:#15803d; border-color:#bbf7d0; }
        .stato-GIACENZA_NEGATIVA { background:#f1f5f9; color:#64748b; border-color:#e2e8f0; }
        .stato-VALORIZZAZIONE_PARZIALE, .stato-CAMBIO_MANCANTE
            { background:#fef3c7; color:#b45309; border-color:#fde68a; }
        .stato-NON_VALORIZZATA { background:#fee2e2; color:#b91c1c; border-color:#fecaca; }
        .quality-item { display:flex; gap:.7rem; align-items:flex-start;
            padding:.6rem .75rem; border:1px solid #e2e8f0; border-radius:.4rem;
            background:white; cursor:pointer; transition: border-color .12s; }
        .quality-item:hover { border-color: var(--aq-primary); }
        .quality-item .q-count { font-size:1.15rem; font-weight:700; min-width:2.2rem;
            text-align:center; }
        .quality-item .q-title { font-size:.8rem; font-weight:600; color:#0f172a; }
        .quality-item .q-hint  { font-size:.72rem; color:#64748b; }
        .vz-table td, .vz-table th { font-size:.8rem; vertical-align: middle; }
        .vz-table tbody tr { cursor: pointer; }
        .vz-info-tip { color:#94a3b8; cursor:help; font-size:.8rem; }

        /* ── Form CRUD shell: vertical tabs left + content right ────────── */
        .form-shell {
            display: grid;
            grid-template-columns: 220px 1fr;
            border: 1px solid #dee2e6;
            border-radius: .5rem;
            background: white;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .form-shell-nav {
            background: #f8f9fa;
            border-right: 1px solid #dee2e6;
            padding: .75rem .5rem;
        }
        .form-shell-nav .nav-link {
            color: #495057;
            padding: .45rem .7rem;
            font-size: .82rem;
            border-radius: .35rem;
            display: flex;
            align-items: center;
            gap: .5rem;
            white-space: nowrap;
            margin-bottom: 2px;
            cursor: pointer;
            border: 0;
            background: transparent;
            width: 100%;
            text-align: left;
        }
        .form-shell-nav .nav-link:hover { background: #e9ecef; }
        .form-shell-nav .nav-link.active {
            background: var(--aq-primary);
            color: white;
            font-weight: 500;
        }
        .form-shell-nav .nav-link.placeholder-tab { color: #adb5bd; font-style: italic; }
        .form-shell-nav .nav-link.placeholder-tab .bi { opacity: .6; }
        .detail-card-title {
            text-transform: uppercase; letter-spacing: 1.5px;
            font-size: .7rem; color: #6c757d; margin-bottom: 0;
        }
        .form-shell-nav .nav-section-label {
            font-size: .65rem;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: .6rem .7rem .25rem;
            font-weight: 600;
        }
        .form-shell-content { padding: 1.5rem; min-height: 420px; }
        .form-shell-content h6.section-title {
            color: var(--aq-primary);
            font-weight: 600;
            font-size: .75rem;
            letter-spacing: 1.5px;
            margin-bottom: 1rem;
            padding-bottom: .5rem;
            border-bottom: 1px solid #e9ecef;
        }
        .form-footer {
            position: sticky;
            bottom: 0;
            background: white;
            border: 1px solid #dee2e6;
            border-radius: .5rem;
            padding: .75rem 1.25rem;
            display: flex;
            justify-content: space-between;
            z-index: 5;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<aside id="sidebar">
    <div class="sidebar-brand">
        <img th:src="@{/img/aquarius-icon.jpg}" alt="" class="brand-icon">
        <div class="brand-text">
            <strong>Aquarius</strong>
            <small>ERP · Web</small>
        </div>
        <button type="button" id="sidebarToggle" class="sidebar-toggle"
                title="Comprimi/espandi menu" aria-label="Comprimi menu">
            <i class="bi bi-chevron-double-left"></i>
        </button>
    </div>

    <!-- Blocco identità: tenant + utente + anno contabile, in alto -->
    <div class="sidebar-identity" sec:authorize="isAuthenticated()">
        <div class="ident-tenant" th:if="${#authentication.principal.tenantDisplayName != null}">
            <i class="bi bi-building"></i>
            <span class="ident-label" th:text="${#authentication.principal.tenantDisplayName}">—</span>
        </div>
        <div class="ident-user">
            <i class="bi bi-person-circle"></i>
            <span class="ident-label" th:text="${#authentication.principal.username}">user</span>
        </div>
        <a th:if="${currentFiscalYear != null}"
           th:href="@{/select-year}"
           class="fiscal-year-badge"
           th:title="${currentFiscalYearDescription + ' — clicca per cambiare'}">
            <i class="bi bi-calendar3"></i>
            <span class="ident-label">Anno <span th:text="${currentFiscalYear}">YYYY</span></span>
            <i class="bi bi-chevron-right ms-auto small ident-label"></i>
        </a>
    </div>

    <nav class="sidebar-nav" id="dynamicMenu">
        <!-- top: dashboard fissa -->
        <a class="menu-item" th:href="@{/dashboard}" th:title="'Dashboard'"
           th:classappend="${#httpServletRequest.requestURI == '/dashboard'} ? 'active'">
            <span class="menu-icon"><i class="bi bi-house-door"></i></span>
            <span class="menu-label">Dashboard</span>
        </a>

        <!-- dynamic tree placeholder -->
        <div id="menuTree">
            <div class="menu-loading"><span class="menu-spinner"></span> <span class="menu-label">Caricamento menu…</span></div>
        </div>

        <!-- Strumenti (fissi, web-app only) -->
        <div class="nav-static-section"><span class="menu-label">Strumenti</span></div>
        <a class="menu-item" th:href="@{/custom-reports}" th:title="'Query personalizzate'"
           th:classappend="${#httpServletRequest.requestURI.startsWith('/custom-reports')} ? 'active'">
            <span class="menu-icon"><i class="bi bi-bar-chart-line"></i></span>
            <span class="menu-label">Query personalizzate</span>
        </a>
        <a class="menu-item" th:href="@{/help}" th:title="'Assistente'"
           th:classappend="${#httpServletRequest.requestURI.startsWith('/help')} ? 'active'">
            <span class="menu-icon"><i class="bi bi-robot"></i></span>
            <span class="menu-label">Assistente</span>
        </a>
    </nav>

    <div class="sidebar-foot" sec:authorize="isAuthenticated()">
        <form th:action="@{/logout}" method="post" class="mb-0">
            <button type="submit" class="btn btn-sm btn-outline-light w-100" style="font-size:.7rem"
                    title="Esci">
                <i class="bi bi-box-arrow-right"></i><span class="menu-label ms-1">Esci</span>
            </button>
        </form>
        <div class="app-version menu-label" th:title="'Build: ' + ${appBuildTime}">
            <i class="bi bi-tag"></i> v<span th:text="${appVersion}">0.0.0</span>
        </div>
    </div>
</aside>

<main class="content">
    <div th:replace="${content}">Page content</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ─── Sidebar dinamica: carica /api/menu/tree e renderizza ─────────────
// Context path (es. "/aquariusweb"), "" in dev alla root. Condiviso tra
// loadMenu e renderNode: gli URL del menu arrivano dal server come path
// assoluti (/magazzino/...) e vanno prefissati col context, altrimenti
// sotto Tomcat puntano alla root del server e danno 404.
const MENU_CTX = (document.querySelector('meta[name=_ctx]')?.content || '/').replace(/\/$/, '');
(async function loadMenu() {
    const container = document.getElementById('menuTree');
    try {
        const res = await fetch(MENU_CTX + '/api/menu/tree', { credentials: 'same-origin' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const tree = await res.json();
        container.innerHTML = '';
        for (const node of tree) {
            const el = renderNode(node, 0);
            if (el) container.appendChild(el);
        }
    } catch (err) {
        container.innerHTML = '<div class="menu-loading" style="color:#fca5a5">' +
                              'Errore caricamento menu: ' + err.message + '</div>';
        console.error(err);
    }
})();

function renderNode(node, depth) {
    if (node.separator) {
        const sep = document.createElement('div');
        sep.className = 'menu-separator';
        return sep;
    }

    const hasChildren = node.children && node.children.length > 0;
    const item = document.createElement(node.url ? 'a' : 'div');
    item.className = 'menu-item';

    // Voce non implementata se è una foglia senza URL
    if (!hasChildren && !node.url) {
        item.classList.add('disabled');
    }

    // node.url arriva come path assoluto dal server (es. /magazzino/...):
    // prefissa il context, altrimenti sotto Tomcat punta alla root -> 404.
    if (node.url) item.href = MENU_CTX + node.url;

    // Icona
    const iconSpan = document.createElement('span');
    iconSpan.className = 'menu-icon';
    iconSpan.innerHTML = '<i class="bi ' + (node.icon || (hasChildren ? 'bi-folder' : 'bi-circle')) + '"></i>';
    item.appendChild(iconSpan);

    // Label
    const labelSpan = document.createElement('span');
    labelSpan.className = 'menu-label';
    labelSpan.textContent = node.label;
    item.appendChild(labelSpan);

    // Annotazione "da migrare" sulle foglie senza URL
    if (!hasChildren && !node.url) {
        const note = document.createElement('span');
        note.className = 'menu-not-implemented';
        note.textContent = '(da migrare)';
        item.appendChild(note);
    }

    // Chevron per i nodi con figli
    if (hasChildren) {
        const chev = document.createElement('span');
        chev.className = 'menu-chevron';
        chev.innerHTML = '<i class="bi bi-chevron-right"></i>';
        item.appendChild(chev);
    }

    // Container per figli
    let result = item;
    if (hasChildren) {
        const wrap = document.createElement('div');
        const childrenDiv = document.createElement('div');
        childrenDiv.className = 'menu-children';
        for (const child of node.children) {
            const c = renderNode(child, depth + 1);
            if (c) childrenDiv.appendChild(c);
        }
        wrap.appendChild(item);
        wrap.appendChild(childrenDiv);
        result = wrap;

        item.addEventListener('click', (e) => {
            e.preventDefault();
            item.classList.toggle('open');
            childrenDiv.classList.toggle('open');
        });
    }

    return result;
}

// ─── Toggle compressione sidebar (persistito per sessione) ────────────
(function initSidebarToggle() {
    const sidebar = document.getElementById('sidebar');
    const btn = document.getElementById('sidebarToggle');
    if (!sidebar || !btn) return;

    const KEY = 'aqSidebarCollapsed';
    // Ripristina lo stato salvato (l'app gira su Tomcat: sessionStorage ok)
    try {
        if (sessionStorage.getItem(KEY) === '1') {
            sidebar.classList.add('collapsed');
            document.body.classList.add('sidebar-collapsed');
        }
    } catch (e) { /* storage non disponibile: ignora */ }

    btn.addEventListener('click', function () {
        const collapsed = sidebar.classList.toggle('collapsed');
        document.body.classList.toggle('sidebar-collapsed', collapsed);
        try { sessionStorage.setItem(KEY, collapsed ? '1' : '0'); } catch (e) {}
    });
})();
</script>
</body>
</html>
