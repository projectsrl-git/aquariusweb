<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Assistente – Aquarius</title></head>
<body><section>

    <div class="page-header">
        <h1><i class="bi bi-robot me-2"></i>Assistente Aquarius</h1>
        <div class="breadcrumb">Help integrato basato su parole chiave</div>
    </div>

    <div class="card shadow-sm border-0" style="max-width: 800px">
        <div class="card-body p-0">
            <div id="chatLog" class="p-3" style="height:480px; overflow-y:auto; background:#f8fafc">
                <div class="chat-msg assistant mb-3">
                    <div class="d-flex gap-2 align-items-start">
                        <div class="rounded-circle bg-info text-white d-flex justify-content-center align-items-center flex-shrink-0"
                             style="width:36px;height:36px"><i class="bi bi-robot"></i></div>
                        <div class="bg-white rounded p-3 shadow-sm" style="max-width:80%">
                            <div class="small text-muted mb-1">Aquarius Assistant</div>
                            <div>Ciao! Sono qui per aiutarti. Prova a chiedermi qualcosa, oppure scrivi <code>help</code>
                            per vedere su quali argomenti so rispondere.</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="border-top p-3 bg-white">
                <form id="chatForm" class="d-flex gap-2">
                    <input type="text" id="chatInput" class="form-control"
                           placeholder="Scrivi una domanda…" autocomplete="off" autofocus>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-send"></i>
                    </button>
                </form>
                <div class="small text-muted mt-2">
                    <i class="bi bi-info-circle"></i>
                    Le risposte sono basate su parole chiave. L'integrazione con un vero AI è in roadmap.
                </div>
            </div>
        </div>
    </div>

    <style>
        .chat-msg.user .d-flex { justify-content: flex-end; }
        .chat-msg.user .bg-white { background: #0ea5e9 !important; color: white; }
        .chat-msg pre { white-space: pre-wrap; margin: 0; font-family: inherit; }
    </style>

    <script th:inline="javascript">
    const form = document.getElementById('chatForm');
    const input = document.getElementById('chatInput');
    const log = document.getElementById('chatLog');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = input.value.trim();
        if (!msg) return;

        appendMessage('user', msg);
        input.value = '';

        const csrfToken = document.querySelector('meta[name=_csrf]')?.content;
        const csrfHeader = document.querySelector('meta[name=_csrf_header]')?.content;
        const headers = {'Content-Type': 'application/json'};
        if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;

        const res = await fetch('/api/help/chat', {
            method: 'POST', headers, body: JSON.stringify({message: msg})
        });
        const data = await res.json();
        appendMessage('assistant', data.response);
    });

    function appendMessage(who, text) {
        const div = document.createElement('div');
        div.className = 'chat-msg ' + who + ' mb-3';
        const icon = who === 'user' ? 'bi-person-fill' : 'bi-robot';
        const bg = who === 'user' ? 'bg-primary' : 'bg-info';
        const author = who === 'user' ? 'Tu' : 'Aquarius Assistant';
        // Convert **bold** and `code` markdown lightly
        const html = escapeHtml(text)
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/`([^`]+)`/g, '<code>$1</code>')
            .replace(/\n/g, '<br>');
        div.innerHTML = `
            <div class="d-flex gap-2 align-items-start">
                <div class="rounded-circle ${bg} text-white d-flex justify-content-center align-items-center flex-shrink-0"
                     style="width:36px;height:36px"><i class="bi ${icon}"></i></div>
                <div class="bg-white rounded p-3 shadow-sm" style="max-width:80%">
                    <div class="small text-muted mb-1">${author}</div>
                    <div>${html}</div>
                </div>
            </div>`;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    function escapeHtml(v) {
        return String(v).replace(/[&<>"']/g,
            c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    </script>

</section></body>
</html>
