<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Query personalizzata – Aquarius</title></head>
<body><section>

    <div class="page-header">
        <h1><i class="bi bi-pencil-square me-2"></i>
            <span th:text="${report.id != null ? 'Modifica query' : 'Nuova query personalizzata'}">Nuova query</span>
        </h1>
        <div class="breadcrumb">
            <a th:href="@{/custom-reports}">Query personalizzate</a> /
            <span th:text="${report.id != null ? report.name : 'Nuova'}">Nuova</span>
        </div>
    </div>

    <form th:action="${report.id != null ? '/custom-reports/' + report.id : '/custom-reports'}"
          th:object="${report}" method="post">

        <div class="row g-3">
            <!-- Sinistra: metadati -->
            <div class="col-md-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white">
                        <h6 class="text-uppercase text-muted mb-0" style="letter-spacing:1.5px;font-size:.7rem">
                            <i class="bi bi-info-circle me-1"></i>Informazioni
                        </h6>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Nome <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{name}" class="form-control" required maxlength="200">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Descrizione</label>
                            <textarea th:field="*{description}" class="form-control" rows="2" maxlength="500"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Categoria</label>
                            <input type="text" th:field="*{category}" class="form-control" maxlength="50"
                                   placeholder="es. VENDITE, MAGAZZINO, ...">
                        </div>
                        <div class="row g-2">
                            <div class="col-7">
                                <label class="form-label small fw-semibold">Icona</label>
                                <input type="text" th:field="*{icon}" class="form-control form-control-sm"
                                       placeholder="bi-bar-chart">
                            </div>
                            <div class="col-5">
                                <label class="form-label small fw-semibold">Colore</label>
                                <input type="color" th:field="*{color}" class="form-control form-control-color">
                            </div>
                        </div>
                        <hr>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" th:field="*{isActive}" id="cbActive">
                            <label class="form-check-label small" for="cbActive">Attiva</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" th:field="*{isPublic}" id="cbPublic">
                            <label class="form-check-label small" for="cbPublic">Visibile a tutti</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Destra: editor SQL -->
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <h6 class="text-uppercase text-muted mb-0" style="letter-spacing:1.5px;font-size:.7rem">
                            <i class="bi bi-code-square me-1"></i>Query SQL
                        </h6>
                        <button type="button" class="btn btn-sm btn-outline-primary" id="btnValidate">
                            <i class="bi bi-check-circle me-1"></i>Valida query
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-info small mb-3">
                            <i class="bi bi-shield-lock me-1"></i>
                            <strong>Solo SELECT sono permessi.</strong> Per parametri usare la sintassi <code>:nome</code>
                            (es. <code>WHERE data &gt;= :data_inizio</code>).
                        </div>
                        <textarea th:field="*{sqlQuery}" class="form-control font-monospace" rows="14" required
                                  placeholder="SELECT * FROM tabella WHERE colonna = :param"></textarea>
                        <div id="validationResult" class="mt-2 small"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-save me-1"></i>Salva
            </button>
            <a th:href="@{/custom-reports}" class="btn btn-outline-secondary">Annulla</a>
        </div>
    </form>

    <script th:inline="javascript">
    document.getElementById('btnValidate').addEventListener('click', async () => {
        const sql = document.querySelector('[name=sqlQuery]').value;
        const csrfToken = document.querySelector('meta[name=_csrf]')?.content;
        const csrfHeader = document.querySelector('meta[name=_csrf_header]')?.content;
        const headers = {'Content-Type': 'application/json'};
        if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;

        const res = await fetch(/*[[@{/custom-reports/validate}]]*/ '/custom-reports/validate', {
            method: 'POST', headers, body: JSON.stringify({sql})
        });
        const data = await res.json();
        const el = document.getElementById('validationResult');
        if (data.valid) {
            el.innerHTML = '<div class="text-success"><i class="bi bi-check-circle"></i> ' + data.message + '</div>';
        } else {
            el.innerHTML = '<div class="text-danger"><i class="bi bi-x-circle"></i> ' + data.error + '</div>';
        }
    });
    </script>

</section></body>
</html>
