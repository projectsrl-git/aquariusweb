<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Query personalizzate – Aquarius</title></head>
<body><section>

    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h1><i class="bi bi-bar-chart-line me-2"></i>Query personalizzate</h1>
            <div class="breadcrumb">Report e analisi definite dall'utente</div>
        </div>
        <a th:href="@{/custom-reports/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i>Nuova query
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${#lists.isEmpty(reports)}" class="text-center py-5 text-muted">
        <i class="bi bi-inbox" style="font-size:3rem"></i>
        <p class="mt-3">Nessuna query personalizzata definita ancora.</p>
        <a th:href="@{/custom-reports/new}" class="btn btn-outline-primary mt-2">Crea la prima</a>
    </div>

    <div th:unless="${#lists.isEmpty(reports)}" class="row g-3">
        <div class="col-md-6 col-lg-4" th:each="r : ${reports}">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title mb-0">
                            <i th:class="${r.icon != null ? r.icon : 'bi bi-table'}"
                               th:style="'color:' + ${r.color != null ? r.color : '#0ea5e9'} + ';margin-right:8px'"></i>
                            <span th:text="${r.name}">Nome report</span>
                        </h5>
                        <span class="badge bg-secondary-subtle text-secondary-emphasis small"
                              th:if="${r.category}"
                              th:text="${r.category}">CATEGORIA</span>
                    </div>
                    <p class="card-text text-muted small" th:text="${r.description ?: '—'}">Descrizione</p>
                    <div class="d-flex justify-content-between align-items-center small text-muted mt-3">
                        <span>
                            <i class="bi bi-play-circle me-1"></i>
                            <span th:text="${r.executionCount ?: 0}">0</span> esecuzioni
                        </span>
                        <span th:if="${r.lastExecuted}"
                              th:text="${'Ultima: ' + #temporals.format(r.lastExecuted, 'dd/MM/yyyy HH:mm')}">
                            Ultima: —
                        </span>
                    </div>
                </div>
                <div class="card-footer bg-white border-top-0 pt-0">
                    <a th:href="@{/custom-reports/{id}(id=${r.id})}" class="btn btn-sm btn-primary">
                        <i class="bi bi-play me-1"></i>Esegui
                    </a>
                    <a th:href="@{/custom-reports/{id}/edit(id=${r.id})}" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <form th:action="@{/custom-reports/{id}/delete(id=${r.id})}" method="post" class="d-inline"
                          onsubmit="return confirm('Disattivare questa query?')">
                        <button type="submit" class="btn btn-sm btn-outline-danger">
                            <i class="bi bi-trash"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</section></body>
</html>
