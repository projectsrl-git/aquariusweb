<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Piano dei conti — Lista</title></head>
<body><section>

    <div th:replace="~{fragments/page-header :: pageHeader(
        icon='bi-bank',
        title='Piano dei conti',
        subtitle=|Anagrafica conti — tabella CONTI · ${accounts.totalElements} record|,
        crumbs=${breadcrumbs}
    )}"></div>

    <div th:if="${flashSuccess}" class="alert alert-success py-2 small mb-3">
        <i class="bi bi-check-circle me-1"></i><span th:text="${flashSuccess}"></span>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div class="btn-group btn-group-sm" role="group">
            <a th:href="@{/conti}" class="btn btn-primary">
                <i class="bi bi-list-ul me-1"></i>Lista flat
            </a>
            <a th:href="@{/conti/tree}" class="btn btn-outline-secondary">
                <i class="bi bi-diagram-3 me-1"></i>Vista albero
            </a>
        </div>
        <form method="get" th:action="@{/conti}" class="flex-grow-1" autocomplete="off" style="max-width:500px">
            <div class="input-group input-group-sm">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" name="q" th:value="${q}" class="form-control"
                       placeholder="Cerca per codice, descrizione, partita IVA…">
                <button type="submit" class="btn btn-primary">Cerca</button>
                <a th:if="${q != ''}" th:href="@{/conti}" class="btn btn-outline-secondary">
                    <i class="bi bi-x"></i>
                </a>
            </div>
        </form>
    </div>

    <div th:if="${accounts.empty}" class="alert alert-info">
        Nessun conto trovato. <span th:if="${q != ''}">Prova a rimuovere il filtro.</span>
    </div>

    <div th:unless="${accounts.empty}" class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover table-sm mb-0 small">
                <thead class="table-light">
                    <tr>
                        <th style="width:140px">Codice</th>
                        <th>Descrizione</th>
                        <th style="width:80px" class="text-center">Tipo</th>
                        <th style="width:80px" class="text-center">Posiz.</th>
                        <th style="width:60px" class="text-center">IVA</th>
                        <th style="width:60px" class="text-center">Padre</th>
                        <th style="width:60px"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="a : ${accounts.content}">
                        <td class="font-monospace text-primary" th:text="${a.code}">001</td>
                        <td th:text="${a.description ?: '—'}">descr</td>
                        <td class="text-center">
                            <span th:if="${a.accountType == 'C'}" class="badge bg-primary-subtle text-primary border">Cli</span>
                            <span th:if="${a.accountType == 'F'}" class="badge bg-success-subtle text-success border">For</span>
                            <span th:if="${a.accountType == 'I'}" class="badge bg-secondary-subtle text-muted border">Iva</span>
                            <span th:if="${a.accountType == 'O'}" class="badge bg-light text-secondary border">Ord</span>
                            <span th:if="${a.accountType == 'P'}" class="badge bg-light text-secondary border">Corr</span>
                            <span th:if="${a.accountType == 'A' or a.accountType == null}"
                                  class="text-muted small">—</span>
                        </td>
                        <td class="text-center">
                            <span th:if="${a.balancePosition == 'P'}"
                                  class="badge bg-info-subtle text-info border">Patrim.</span>
                            <span th:if="${a.balancePosition == 'E'}"
                                  class="badge bg-warning-subtle text-warning border">Econ.</span>
                        </td>
                        <td class="text-center">
                            <i th:if="${a.hasVat != null and a.hasVat}" class="bi bi-check-circle-fill text-success"></i>
                            <i th:unless="${a.hasVat != null and a.hasVat}" class="bi bi-dash text-muted"></i>
                        </td>
                        <td class="text-center">
                            <i th:if="${a.isParent != null and a.isParent}" class="bi bi-folder2 text-primary"></i>
                        </td>
                        <td>
                            <a th:href="@{/conti/{id}/edit(id=${a.id})}"
                               class="btn btn-sm btn-outline-primary py-0 px-2">
                                <i class="bi bi-pencil"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:if="${accounts.totalPages > 1}" class="mt-3 d-flex justify-content-between align-items-center">
        <span class="text-muted small">
            Pagina <span th:text="${accounts.number + 1}">1</span> di <span th:text="${accounts.totalPages}">N</span>
            · <span th:text="${accounts.totalElements}">N</span> conti
        </span>
        <ul class="pagination pagination-sm mb-0">
            <li class="page-item" th:classappend="${accounts.first} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/conti(q=${q},page=${accounts.number - 1})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>
            <li class="page-item" th:classappend="${accounts.last} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/conti(q=${q},page=${accounts.number + 1})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>
        </ul>
    </nav>

</section></body>
</html>
