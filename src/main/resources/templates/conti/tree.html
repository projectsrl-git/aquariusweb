<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Piano dei conti — Vista ad albero</title>
</head>
<body><section>

    <div th:replace="~{fragments/page-header :: pageHeader(
        icon='bi-diagram-3',
        title='Piano dei conti',
        subtitle=|Vista gerarchica · ${totalCount} conti caricati|,
        crumbs=${breadcrumbs}
    )}"></div>

    <!-- Toolbar -->
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div class="btn-group btn-group-sm" role="group">
            <a th:href="@{/conti}" class="btn btn-outline-secondary">
                <i class="bi bi-list-ul me-1"></i>Lista flat
            </a>
            <a th:href="@{/conti/tree}" class="btn btn-primary">
                <i class="bi bi-diagram-3 me-1"></i>Vista albero
            </a>
        </div>
        <div class="btn-group btn-group-sm" role="group">
            <button type="button" class="btn btn-outline-primary" id="expandAllBtn">
                <i class="bi bi-arrows-expand me-1"></i>Espandi tutto
            </button>
            <button type="button" class="btn btn-outline-secondary" id="collapseAllBtn">
                <i class="bi bi-arrows-collapse me-1"></i>Comprimi tutto
            </button>
        </div>
    </div>

    <!-- Search -->
    <div class="mb-3">
        <div class="input-group" style="max-width:500px">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" id="treeFilter" class="form-control form-control-sm"
                   placeholder="Filtra per codice o descrizione (filtro live)…">
            <button type="button" class="btn btn-outline-secondary btn-sm" id="clearFilter">
                <i class="bi bi-x"></i>
            </button>
        </div>
    </div>

    <!-- Albero -->
    <div class="card border-0 shadow-sm">
        <div class="card-body py-2">
            <ul class="account-tree" id="accountTree">
                <li th:each="node : ${roots}"
                    th:replace="~{fragments/account-tree-node :: treeNode(${node})}"></li>
            </ul>
        </div>
    </div>

    <style>
        .account-tree, .account-tree ul { list-style: none; padding-left: 0; margin: 0; }
        .account-tree .acc-children { padding-left: 1.4rem; border-left: 1px dashed #dee2e6;
                                       margin-left: .55rem; }
        .acc-row { padding: .25rem .5rem; border-radius: .3rem; display: flex; align-items: center;
                   font-size: .85rem; transition: background .12s ease; }
        .acc-row:hover { background: #f1f5f9; }
        .acc-row.is-parent { font-weight: 500; }
        .acc-row.is-leaf  { font-weight: 400; }
        .acc-toggle { display: inline-flex; width: 18px; height: 18px; align-items: center;
                      justify-content: center; cursor: pointer; color: #6c757d;
                      transition: transform .15s ease; user-select: none; }
        .acc-toggle:hover { color: var(--aq-primary); }
        .acc-toggle[aria-expanded="true"] { transform: rotate(90deg); color: var(--aq-primary); }
        .acc-toggle-spacer { display: inline-block; width: 18px; }
        .acc-link { color: #212529; }
        .acc-link:hover .acc-descr { color: var(--aq-primary); }
        .acc-descr { color: #495057; }
        .small-icon { font-size: .35rem; vertical-align: middle; }
        .acc-node.hidden { display: none; }
    </style>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function () {
            const tree = document.getElementById('accountTree');

            tree.addEventListener('show.bs.collapse', e => {
                const toggle = document.querySelector(`[data-bs-target="#${e.target.id}"]`);
                if (toggle) toggle.setAttribute('aria-expanded', 'true');
            });
            tree.addEventListener('hide.bs.collapse', e => {
                const toggle = document.querySelector(`[data-bs-target="#${e.target.id}"]`);
                if (toggle) toggle.setAttribute('aria-expanded', 'false');
            });

            document.getElementById('expandAllBtn').addEventListener('click', () => {
                tree.querySelectorAll('.acc-children').forEach(el => {
                    el.classList.add('show');
                    const toggle = document.querySelector(`[data-bs-target="#${el.id}"]`);
                    if (toggle) toggle.setAttribute('aria-expanded', 'true');
                });
            });
            document.getElementById('collapseAllBtn').addEventListener('click', () => {
                tree.querySelectorAll('.acc-children').forEach(el => {
                    el.classList.remove('show');
                    const toggle = document.querySelector(`[data-bs-target="#${el.id}"]`);
                    if (toggle) toggle.setAttribute('aria-expanded', 'false');
                });
            });

            const input = document.getElementById('treeFilter');
            const clearBtn = document.getElementById('clearFilter');

            function applyFilter() {
                const q = input.value.trim().toLowerCase();
                if (!q) {
                    tree.querySelectorAll('.acc-node').forEach(n => n.classList.remove('hidden'));
                    return;
                }
                tree.querySelectorAll('.acc-node').forEach(n => n.classList.add('hidden'));
                tree.querySelectorAll('.acc-node').forEach(n => {
                    const code = (n.dataset.code || '').toLowerCase();
                    const descr = (n.dataset.descr || '').toLowerCase();
                    if (code.includes(q) || descr.includes(q)) {
                        let cur = n;
                        while (cur && cur.classList.contains('acc-node')) {
                            cur.classList.remove('hidden');
                            const parentUl = cur.parentElement;
                            if (parentUl && parentUl.classList.contains('acc-children')) {
                                parentUl.classList.add('show');
                                const t = document.querySelector(`[data-bs-target="#${parentUl.id}"]`);
                                if (t) t.setAttribute('aria-expanded', 'true');
                            }
                            cur = parentUl ? parentUl.parentElement : null;
                        }
                    }
                });
            }

            input.addEventListener('input', applyFilter);
            clearBtn.addEventListener('click', () => { input.value = ''; applyFilter(); });
        });
    </script>

</section></body>
</html>
