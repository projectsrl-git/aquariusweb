<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head>
    <title>Piano dei conti — Vista ad albero</title>
</head>
<body><section>

    <div th:replace="~{fragments/page-header :: pageHeader(
        icon='bi-diagram-3',
        title='Piano dei conti',
        subtitle='Vista gerarchica mastri → sottogruppi → conti',
        crumbs=${breadcrumbs}
    )}"></div>

    <link rel="stylesheet" th:href="@{/css/aq-tree.css}">

    <!-- Toolbar -->
    <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
        <div class="btn-group btn-group-sm" role="group">
            <a th:href="@{/conti}" class="btn btn-outline-secondary">
                <i class="bi bi-list-ul me-1"></i>Lista flat
            </a>
            <a th:href="@{/conti/tree}" class="btn btn-primary">
                <i class="bi bi-diagram-3 me-1"></i>Vista albero
            </a>
        </div>
        <div class="btn-group btn-group-sm" role="group">
            <button type="button" class="btn btn-outline-primary" id="btnMastri"
                    title="Mostra i mastri espansi (sottogruppi visibili)">Mastri</button>
            <button type="button" class="btn btn-outline-primary" id="btnSottog"
                    title="Espandi fino ai sottogruppi (conti visibili)">Sottogruppi</button>
            <button type="button" class="btn btn-outline-primary" id="btnTutto">
                <i class="bi bi-arrows-expand me-1"></i>Tutto
            </button>
            <button type="button" class="btn btn-outline-secondary" id="btnComprimi">
                <i class="bi bi-arrows-collapse me-1"></i>Comprimi
            </button>
        </div>
    </div>

    <!-- Search -->
    <div class="mb-2">
        <div class="input-group" style="max-width:520px">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" id="treeFilter" class="form-control form-control-sm"
                   placeholder="Filtra per codice o descrizione (live)…" autocomplete="off">
            <button type="button" class="btn btn-outline-secondary btn-sm" id="clearFilter">
                <i class="bi bi-x"></i>
            </button>
        </div>
    </div>

    <!-- Struttura rilevata (popolata da JS dai meta del payload) -->
    <div id="structureInfo" class="text-muted mb-2" style="font-size:.75rem"></div>

    <!-- Albero -->
    <div class="card border-0 shadow-sm">
        <div class="card-body py-2">
            <div id="treeLoading" class="aqt-loading">
                <span class="spinner"></span> Caricamento piano dei conti…
            </div>
            <div id="accountTree" style="display:none"></div>
        </div>
    </div>

    <script th:src="@{/js/aq-tree.js}"></script>
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', async function () {
            const treeDataUrl = /*[[@{/conti/tree-data}]]*/ '/conti/tree-data';
            const contoBaseUrl = /*[[@{/conti/}]]*/ '/conti/';

            let payload;
            try {
                const resp = await fetch(treeDataUrl, { headers: { 'Accept': 'application/json' } });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                payload = await resp.json();
            } catch (err) {
                document.getElementById('treeLoading').innerHTML =
                    '<i class="bi bi-exclamation-triangle text-danger me-2"></i>' +
                    'Errore nel caricamento dei dati: ' + err.message;
                return;
            }

            document.getElementById('treeLoading').style.display = 'none';
            const container = document.getElementById('accountTree');
            container.style.display = '';

            const tree = AqTree.mount(container, payload, {
                href: id => contoBaseUrl + encodeURIComponent(id)
            });

            // Riga informativa: struttura + numeri + tempi
            const m = payload.meta;
            if (m && m.structure) {
                document.getElementById('structureInfo').innerHTML =
                    '<i class="bi bi-cpu me-1"></i>' +
                    'Struttura <code>' + m.structure.source + '</code>: ' +
                    'mastro <b>' + m.structure.mastroLen + '</b> + ' +
                    'sottogruppo <b>' + m.structure.sottogLen + '</b> car. — ' +
                    (m.levels.mastri || 0) + ' mastri · ' +
                    (m.levels.sottogruppi || 0) + ' sottogruppi · ' +
                    (m.levels.conti || 0) + ' conti' +
                    ' <span class="ms-2 opacity-50">(query ' + m.queryMillis + 'ms, build ' + m.buildMillis + 'ms)</span>';
            }

            // Controlli toolbar
            document.getElementById('btnMastri').addEventListener('click', () => tree.expandToLevel(1));
            document.getElementById('btnSottog').addEventListener('click', () => tree.expandToLevel(2));
            document.getElementById('btnTutto').addEventListener('click', () => tree.expandAll());
            document.getElementById('btnComprimi').addEventListener('click', () => {
                document.getElementById('treeFilter').value = '';
                tree.collapseAll();
            });

            // Filtro live
            const input = document.getElementById('treeFilter');
            input.addEventListener('input', () => tree.filter(input.value));
            document.getElementById('clearFilter').addEventListener('click', () => {
                input.value = '';
                tree.filter('');
            });
        });
    </script>

</section></body>
</html>
