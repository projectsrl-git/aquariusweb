<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Fornitori – Aquarius</title></head>
<body><section>

    <div th:replace="~{fragments/page-header :: pageHeader(
        icon='bi-truck',
        title='Fornitori',
        subtitle='Anagrafica fornitori — tabella U_FOR_AN',
        crumbs=${breadcrumbs}
    )}"></div>

    <form method="get" th:action="@{/fornitori}" class="mb-3">
        <input type="hidden" name="size" th:value="${size}">
        <input type="hidden" name="sort" th:value="${sort}">
        <input type="hidden" name="dir" th:value="${dir}">
        <div class="input-group" style="max-width:600px">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" name="q" th:value="${q}" class="form-control"
                   placeholder="Ragione sociale, codice o partita IVA…">
            <button type="submit" class="btn btn-primary">Cerca</button>
            <a th:href="@{/fornitori}" class="btn btn-outline-secondary" th:if="${q != null and q != ''}">
                <i class="bi bi-x"></i>
            </a>
        </div>
    </form>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-sm mb-0">
                    <thead class="table-light">
                        <tr>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/fornitori','code','Codice',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/fornitori','businessName','Ragione sociale',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/fornitori','vatNumber','P.IVA',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/fornitori','city','Città',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/fornitori','zone','Zona',${q},${size},${sort},${dir},'')}"></th>
                            <th>Email</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${suppliers.content}">
                            <td>
                                <a th:href="@{/fornitori/{id}(id=${s.id})}"
                                   class="font-monospace small text-decoration-none"
                                   th:text="${s.code}">FOR0001</a>
                            </td>
                            <td>
                                <a th:href="@{/fornitori/{id}(id=${s.id})}"
                                   class="text-decoration-none text-dark fw-semibold"
                                   th:text="${s.businessName}">Ragione sociale</a>
                            </td>
                            <td class="font-monospace small" th:text="${s.vatNumber ?: '—'}">12345678901</td>
                            <td th:text="${s.city ?: '—'}">Milano</td>
                            <td><span class="badge bg-secondary-subtle text-secondary-emphasis"
                                      th:if="${s.zone != null and s.zone != ''}" th:text="${s.zone}">01</span></td>
                            <td class="small text-muted" th:text="${s.email ?: ''}">email@example.com</td>
                        </tr>
                        <tr th:if="${suppliers.empty}">
                            <td colspan="6" class="text-center text-muted py-5">
                                <i class="bi bi-inbox" style="font-size:2rem"></i>
                                <p class="mt-2 mb-0" th:text="${q != null and q != '' ? 'Nessun fornitore trovato per «' + q + '»' : 'Nessun fornitore trovato.'}">Nessun fornitore</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/list-tools :: pager('/fornitori',${suppliers.number},${q},${size},${sort},${dir},${suppliers})}"></div>

</section></body>
</html>
