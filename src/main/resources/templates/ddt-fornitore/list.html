<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Carichi da fornitore – Aquarius</title></head>
<body><section>

    <div th:replace="~{fragments/page-header :: pageHeader(
        icon='bi-box-arrow-in-down',
        title='Carichi da fornitore',
        subtitle='Consultazione documenti di entrata merce — anno ' + ${currentFiscalYear} + ' (tabelle U_BFO_TT / U_BFO_DD)',
        crumbs=${breadcrumbs}
    )}"></div>

    <form method="get" th:action="@{/ddt-fornitore}" class="mb-3">
        <input type="hidden" name="size" th:value="${size}">
        <input type="hidden" name="sort" th:value="${sort}">
        <input type="hidden" name="dir" th:value="${dir}">
        <div class="input-group" style="max-width:600px">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" name="q" th:value="${q}" class="form-control"
                   placeholder="Numero, fornitore o riferimento…">
            <button type="submit" class="btn btn-primary">Cerca</button>
            <a th:href="@{/ddt-fornitore}" class="btn btn-outline-secondary" th:if="${q != null and q != ''}">
                <i class="bi bi-x"></i>
            </a>
        </div>
    </form>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-sm mb-0">
                    <thead class="table-light">
                        <tr>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/ddt-fornitore','documentNumber','Numero',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/ddt-fornitore','documentDate','Data',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/ddt-fornitore','supplierCode','Fornitore',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/ddt-fornitore','supplierName','Ragione sociale',${q},${size},${sort},${dir},'')}"></th>
                            <th>Riferimento</th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/ddt-fornitore','documentValue','Valore',${q},${size},${sort},${dir},'text-end')}"></th>
                            <th>Tipo</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="d : ${documents.content}">
                            <td>
                                <a th:href="@{/ddt-fornitore/{id}(id=${d.id})}"
                                   class="font-monospace small text-decoration-none"
                                   th:text="${d.documentNumber != null ? d.documentNumber.trim() : ''}">000123</a>
                            </td>
                            <td class="small"><span th:replace="~{fragments/list-tools :: itDate(${d.documentDate})}"></span></td>
                            <td class="font-monospace small" th:text="${d.supplierCode != null ? d.supplierCode.trim() : '—'}">FOR001</td>
                            <td>
                                <a th:href="@{/ddt-fornitore/{id}(id=${d.id})}"
                                   class="text-decoration-none text-dark"
                                   th:text="${d.supplierName ?: '—'}">Fornitore S.r.l.</a>
                            </td>
                            <td class="small" th:text="${d.reference != null and !d.reference.trim().isEmpty() ? d.reference : '—'}">—</td>
                            <td class="text-end font-monospace small"
                                th:text="${d.documentValue != null ? #numbers.formatDecimal(d.documentValue, 1, 'POINT', 2, 'COMMA') : '—'}">0,00</td>
                            <td>
                                <span class="badge bg-warning-subtle text-warning-emphasis" th:if="${d.isCustomerReturn()}"
                                      title="ORD_TIPO = 9">Reso da cliente</span>
                                <span class="badge bg-success-subtle text-success-emphasis" th:unless="${d.isCustomerReturn()}">Carico</span>
                            </td>
                        </tr>
                        <tr th:if="${documents.empty}">
                            <td colspan="7" class="text-center text-muted py-5">
                                <i class="bi bi-inbox" style="font-size:2rem"></i>
                                <p class="mt-2 mb-0">Nessun documento di carico trovato per questo anno.</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/list-tools :: pager('/ddt-fornitore',${documents.number},${q},${size},${sort},${dir},${documents})}"></div>

</section></body>
</html>
