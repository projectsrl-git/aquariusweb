<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Articoli – Aquarius</title></head>
<body><section>

    <div th:replace="~{fragments/page-header :: pageHeader(
        icon='bi-box',
        title='Articoli',
        subtitle='Anagrafica articoli — consultazione (tabella U_ART_PR)',
        crumbs=${breadcrumbs}
    )}"></div>

    <form method="get" th:action="@{/articoli}" class="mb-3">
        <input type="hidden" name="size" th:value="${size}">
        <input type="hidden" name="sort" th:value="${sort}">
        <input type="hidden" name="dir" th:value="${dir}">
        <div class="input-group" style="max-width:600px">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" name="q" th:value="${q}" class="form-control"
                   placeholder="Codice, descrizione, barcode o fornitore…">
            <button type="submit" class="btn btn-primary">Cerca</button>
            <a th:href="@{/articoli}" class="btn btn-outline-secondary" th:if="${q != null and q != ''}">
                <i class="bi bi-x"></i>
            </a>
        </div>
    </form>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-sm mb-0">
                    <thead class="table-light">
                        <tr>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/articoli','code','Codice',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/articoli','description','Descrizione',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/articoli','unitOfMeasure','UM',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/articoli','salePrice1','Prezzo vendita',${q},${size},${sort},${dir},'text-end')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/articoli','vatCode','IVA',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/articoli','commodityCategory','Cat. merc.',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/articoli','supplierCode','Fornitore',${q},${size},${sort},${dir},'')}"></th>
                            <th>Stato</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="a : ${articles.content}">
                            <td>
                                <a th:href="@{/articoli/{id}(id=${a.id})}"
                                   class="font-monospace small text-decoration-none">
                                    <span th:text="${a.code != null ? a.code.trim() : ''}">ART001</span><span
                                        th:if="${a.extension != null and !a.extension.trim().isEmpty()}"
                                        class="text-muted" th:text="'/' + ${a.extension.trim()}">/01</span>
                                </a>
                            </td>
                            <td>
                                <a th:href="@{/articoli/{id}(id=${a.id})}"
                                   class="text-decoration-none text-dark"
                                   th:text="${a.description ?: '—'}">Descrizione</a>
                            </td>
                            <td><span class="badge bg-light text-dark border"
                                      th:if="${a.unitOfMeasure != null and !a.unitOfMeasure.trim().isEmpty()}"
                                      th:text="${a.unitOfMeasure.trim()}">PZ</span></td>
                            <td class="text-end font-monospace small"
                                th:text="${a.salePrice1 != null ? #numbers.formatDecimal(a.salePrice1, 1, 'POINT', 2, 'COMMA') : '—'}">0,00</td>
                            <td><span class="badge bg-info-subtle text-info-emphasis"
                                      th:if="${a.vatCode != null and !a.vatCode.trim().isEmpty()}"
                                      th:text="${a.vatCode.trim()}">22</span></td>
                            <td><span class="badge bg-secondary-subtle text-secondary-emphasis"
                                      th:if="${a.commodityCategory != null and !a.commodityCategory.trim().isEmpty()}"
                                      th:text="${a.commodityCategory.trim()}">001</span></td>
                            <td class="font-monospace small" th:text="${a.supplierCode != null and !a.supplierCode.trim().isEmpty() ? a.supplierCode.trim() : '—'}">FOR001</td>
                            <td>
                                <span class="badge bg-warning-subtle text-warning-emphasis"
                                      th:if="${a.isObsolete()}">Obsoleto</span>
                            </td>
                        </tr>
                        <tr th:if="${articles.empty}">
                            <td colspan="8" class="text-center text-muted py-5">
                                <i class="bi bi-inbox" style="font-size:2rem"></i>
                                <p class="mt-2 mb-0" th:text="${q != null and q != '' ? 'Nessun articolo trovato per «' + q + '»' : 'Nessun articolo trovato.'}">Nessun articolo</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/list-tools :: pager('/articoli',${articles.number},${q},${size},${sort},${dir},${articles})}"></div>

</section></body>
</html>
