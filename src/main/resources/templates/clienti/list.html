<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Clienti – Aquarius</title></head>
<body><section>

    <div th:replace="~{fragments/page-header :: pageHeader(
        icon='bi-people',
        title='Clienti',
        subtitle='Anagrafica clienti — tabella U_CLI_AN',
        crumbs=${breadcrumbs}
    )}"></div>

    <div class="d-flex justify-content-end mb-3">
        <a th:href="@{/clienti/map}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-geo-alt me-1"></i>Mappa <small>(coming soon)</small>
        </a>
    </div>

    <form method="get" th:action="@{/clienti}" class="mb-3">
        <input type="hidden" name="size" th:value="${size}">
        <input type="hidden" name="sort" th:value="${sort}">
        <input type="hidden" name="dir" th:value="${dir}">
        <div class="input-group" style="max-width:600px">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" name="q" th:value="${q}" class="form-control"
                   placeholder="Ragione sociale, codice o partita IVA…">
            <button type="submit" class="btn btn-primary">Cerca</button>
            <a th:href="@{/clienti}" class="btn btn-outline-secondary" th:if="${q != null and q != ''}">
                <i class="bi bi-x"></i>
            </a>
        </div>
    </form>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-sm mb-0">
                    <thead class="table-light">
                        <tr>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/clienti','code','Codice',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/clienti','businessName','Ragione sociale',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/clienti','vatNumber','P.IVA',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/clienti','city','Città',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/clienti','zone','Zona',${q},${size},${sort},${dir},'')}"></th>
                            <th>Email</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${customers.content}">
                            <td>
                                <a th:href="@{/clienti/{id}(id=${c.id})}"
                                   class="font-monospace small text-decoration-none"
                                   th:text="${c.code}">CLI0001</a>
                            </td>
                            <td>
                                <a th:href="@{/clienti/{id}(id=${c.id})}"
                                   class="text-decoration-none text-dark fw-semibold"
                                   th:text="${c.businessName}">Ragione sociale</a>
                            </td>
                            <td class="font-monospace small" th:text="${c.vatNumber ?: '—'}">12345678901</td>
                            <td th:text="${c.city ?: '—'}">Milano</td>
                            <td><span class="badge bg-secondary-subtle text-secondary-emphasis"
                                      th:if="${c.zone != null and c.zone != ''}" th:text="${c.zone}">01</span></td>
                            <td class="small text-muted" th:text="${c.email ?: ''}">email@example.com</td>
                        </tr>
                        <tr th:if="${customers.empty}">
                            <td colspan="6" class="text-center text-muted py-5">
                                <i class="bi bi-inbox" style="font-size:2rem"></i>
                                <p class="mt-2 mb-0" th:text="${q != null and q != '' ? 'Nessun cliente trova per «' + q + '»' : 'Nessun cliente trovato.'}">Nessun cliente</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/list-tools :: pager('/clienti',${customers.number},${q},${size},${sort},${dir},${customers})}"></div>

</section></body>
</html>
