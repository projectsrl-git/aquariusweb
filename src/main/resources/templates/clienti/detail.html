<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Cliente – Aquarius</title></head>
<body><section>

    <div th:replace="~{fragments/page-header :: pageHeader(
        icon='bi-person',
        title=${customer.businessName},
        subtitle='Cliente ' + ${customer.code},
        crumbs=${breadcrumbs}
    )}"></div>

    <div th:if="${flashSuccess}" class="alert alert-success py-2 small mb-3">
        <i class="bi bi-check-circle me-1"></i><span th:text="${flashSuccess}"></span>
    </div>
    <div th:if="${flashError}" class="alert alert-danger py-2 small mb-3">
        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${flashError}"></span>
    </div>

    <div class="row g-3">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white">
                    <h6 class="text-uppercase text-muted mb-0" style="letter-spacing:1.5px;font-size:.7rem">
                        <i class="bi bi-card-text me-1"></i>Anagrafica
                    </h6>
                </div>
                <div class="card-body">
                    <dl class="row mb-0 small">
                        <dt class="col-4 text-muted">Codice</dt>
                        <dd class="col-8 font-monospace" th:text="${customer.code}">CLI0001</dd>
                        <dt class="col-4 text-muted">Ragione sociale</dt>
                        <dd class="col-8" th:text="${customer.businessName}">—</dd>
                        <dt class="col-4 text-muted" th:if="${customer.businessName2}">2ª denominazione</dt>
                        <dd class="col-8" th:if="${customer.businessName2}" th:text="${customer.businessName2}">—</dd>
                        <dt class="col-4 text-muted">P.IVA</dt>
                        <dd class="col-8 font-monospace" th:text="${customer.vatNumber ?: '—'}">—</dd>
                        <dt class="col-4 text-muted">Codice fiscale</dt>
                        <dd class="col-8 font-monospace" th:text="${customer.taxCode ?: '—'}">—</dd>
                        <dt class="col-4 text-muted">Tipo</dt>
                        <dd class="col-8" th:text="${customer.personType == 'F' ? 'Persona Fisica' : (customer.personType == 'G' ? 'Persona Giuridica' : (customer.personType ?: '—'))}">—</dd>
                    </dl>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white">
                    <h6 class="text-uppercase text-muted mb-0" style="letter-spacing:1.5px;font-size:.7rem">
                        <i class="bi bi-geo-alt me-1"></i>Sede e contatti
                    </h6>
                </div>
                <div class="card-body">
                    <dl class="row mb-0 small">
                        <dt class="col-4 text-muted">Indirizzo</dt>
                        <dd class="col-8" th:text="${customer.address ?: '—'}">—</dd>
                        <dt class="col-4 text-muted">CAP/Città</dt>
                        <dd class="col-8" th:text="${(customer.zipCode ?: '') + ' ' + (customer.city ?: '')}">—</dd>
                        <dt class="col-4 text-muted">Nazione</dt>
                        <dd class="col-8" th:text="${customer.country ?: '—'}">—</dd>
                        <dt class="col-4 text-muted">Telefono</dt>
                        <dd class="col-8" th:text="${customer.phone ?: '—'}">—</dd>
                        <dt class="col-4 text-muted">Email</dt>
                        <dd class="col-8" th:text="${customer.email ?: '—'}">—</dd>
                    </dl>
                </div>
            </div>
        </div>

        <div class="col-12" th:if="${customer.notes != null and customer.notes != ''}">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white">
                    <h6 class="text-uppercase text-muted mb-0" style="letter-spacing:1.5px;font-size:.7rem">
                        <i class="bi bi-journal me-1"></i>Note
                    </h6>
                </div>
                <div class="card-body small" style="white-space:pre-wrap" th:text="${customer.notes}">Note</div>
            </div>
        </div>
    </div>

    <div class="mt-3 d-flex gap-2">
        <a th:href="@{/clienti}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Torna alla lista
        </a>
        <a th:href="@{/clienti/{id}/edit(id=${customer.id})}" class="btn btn-primary">
            <i class="bi bi-pencil-square me-1"></i>Modifica anagrafica
        </a>
    </div>

</section></body>
</html>
