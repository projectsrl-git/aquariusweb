<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Partitari – Aquarius</title></head>
<body><section>

    <div th:replace="~{fragments/page-header :: pageHeader(
        icon='bi-person-lines-fill',
        title=${tipo == 'clienti' ? 'Partitario clienti' : 'Partitario fornitori'},
        subtitle='Partite aperte — esercizio ' + ${anno},
        crumbs=${breadcrumbs}
    )}"></div>

    <form method="get" th:action="@{'/contabilita/partitari/' + ${tipo}}" class="mb-3">
        <div class="input-group" style="max-width:600px">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" name="q" th:value="${q}" class="form-control"
                   placeholder="Codice, ragione sociale o numero fattura…">
            <button type="submit" class="btn btn-primary">Cerca</button>
            <a th:href="@{'/contabilita/partitari/' + ${tipo}}" class="btn btn-outline-secondary" th:if="${q != null and q != ''}">
                <i class="bi bi-x"></i>
            </a>
        </div>
    </form>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-sm mb-0">
                    <thead class="table-light">
                        <tr>
                            <th style="width:90px">Codice</th>
                            <th>Ragione sociale</th>
                            <th style="width:110px">N. Fattura</th>
                            <th style="width:100px">Scadenza</th>
                            <th style="width:120px" class="text-end">Totale</th>
                            <th style="width:120px" class="text-end">Pagato</th>
                            <th style="width:120px" class="text-end">Residuo</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${partite.content}">
                            <td class="font-monospace small" th:text="${p.partyCode}">0149200</td>
                            <td class="small" th:text="${p.partyName ?: '—'}">Ragione sociale</td>
                            <td class="small font-monospace" th:text="${p.invoiceNo ?: '—'}">FT 42</td>
                            <td class="small" th:text="${p.dueDate ?: '—'}">2026/03/31</td>
                            <td class="text-end font-monospace small"
                                th:text="${p.totalAmount != null ? #numbers.formatDecimal(p.totalAmount,1,'POINT',2,'COMMA') : '—'}">0,00</td>
                            <td class="text-end font-monospace small"
                                th:text="${p.paidAmount != null ? #numbers.formatDecimal(p.paidAmount,1,'POINT',2,'COMMA') : '—'}">0,00</td>
                            <td class="text-end font-monospace small fw-semibold"
                                th:classappend="${p.residual.signum() > 0 ? 'text-danger' : 'text-success'}"
                                th:text="${#numbers.formatDecimal(p.residual,1,'POINT',2,'COMMA')}">0,00</td>
                        </tr>
                        <tr th:if="${partite.empty}">
                            <td colspan="7" class="text-center text-muted py-5">
                                <i class="bi bi-inbox" style="font-size:2rem"></i>
                                <p class="mt-2 mb-0">Nessuna partita trovata.</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <nav th:if="${partite.totalPages > 1}" class="mt-3">
        <ul class="pagination pagination-sm">
            <li class="page-item" th:classappend="${partite.first ? 'disabled' : ''}">
                <a class="page-link" th:href="@{'/contabilita/partitari/' + ${tipo}(q=${q}, page=${partite.number - 1})}">«</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link"
                      th:text="${'Pagina ' + (partite.number + 1) + ' di ' + partite.totalPages + ' · ' + partite.totalElements + ' partite'}">Pagina 1</span>
            </li>
            <li class="page-item" th:classappend="${partite.last ? 'disabled' : ''}">
                <a class="page-link" th:href="@{'/contabilita/partitari/' + ${tipo}(q=${q}, page=${partite.number + 1})}">»</a>
            </li>
        </ul>
    </nav>

</section></body>
</html>
