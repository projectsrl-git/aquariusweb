<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Partitari – Aquarius</title></head>
<body><section>

    <div th:replace="~{fragments/page-header :: pageHeader(
        icon='bi-person-lines-fill',
        title=${tipo == 'clienti' ? 'Partitario clienti' : 'Partitario fornitori'},
        subtitle='Partite aperte — esercizio ' + ${anno},
        crumbs=${breadcrumbs}
    )}"></div>

    <form method="get" th:action="@{'/contabilita/partitari/' + ${tipo}}" class="mb-3">
        <input type="hidden" name="size" th:value="${size}">
        <input type="hidden" name="sort" th:value="${sort}">
        <input type="hidden" name="dir" th:value="${dir}">
        <div class="input-group" style="max-width:600px">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" name="q" th:value="${q}" class="form-control"
                   placeholder="Codice, ragione sociale o numero fattura…">
            <button type="submit" class="btn btn-primary">Cerca</button>
            <a th:href="@{'/contabilita/partitari/' + ${tipo}}" class="btn btn-outline-secondary" th:if="${q != null and q != ''}">
                <i class="bi bi-x"></i>
            </a>
        </div>
    </form>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-sm mb-0">
                    <thead class="table-light">
                        <tr>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/contabilita/partitari/' + ${tipo},'partyCode','Codice',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/contabilita/partitari/' + ${tipo},'partyName','Ragione sociale',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/contabilita/partitari/' + ${tipo},'invoiceNo','N. Fattura',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/contabilita/partitari/' + ${tipo},'dueDate','Scadenza',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/contabilita/partitari/' + ${tipo},'totalAmount','Totale',${q},${size},${sort},${dir},'text-end')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/contabilita/partitari/' + ${tipo},'paidAmount','Pagato',${q},${size},${sort},${dir},'text-end')}"></th>
                            <th class="text-end">Residuo</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${partite.content}">
                            <td class="font-monospace small" th:text="${p.partyCode}">0149200</td>
                            <td class="small" th:text="${p.partyName ?: '—'}">Ragione sociale</td>
                            <td class="small font-monospace" th:text="${p.invoiceNo ?: '—'}">FT 42</td>
                            <td class="small"><span th:replace="~{fragments/list-tools :: itDate(${p.dueDate})}">31/03/2026</span></td>
                            <td class="text-end font-monospace small"
                                th:text="${p.totalAmount != null ? #numbers.formatDecimal(p.totalAmount,1,'POINT',2,'COMMA') : '—'}">0,00</td>
                            <td class="text-end font-monospace small"
                                th:text="${p.paidAmount != null ? #numbers.formatDecimal(p.paidAmount,1,'POINT',2,'COMMA') : '—'}">0,00</td>
                            <td class="text-end font-monospace small fw-semibold"
                                th:classappend="${p.residual.signum() > 0 ? 'text-danger' : 'text-success'}"
                                th:text="${#numbers.formatDecimal(p.residual,1,'POINT',2,'COMMA')}">0,00</td>
                        </tr>
                        <tr th:if="${partite.empty}">
                            <td colspan="7" class="text-center text-muted py-5">
                                <i class="bi bi-inbox" style="font-size:2rem"></i>
                                <p class="mt-2 mb-0">Nessuna partita trovata.</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/list-tools :: pager('/contabilita/partitari/' + ${tipo},${partite.number},${q},${size},${sort},${dir},${partite})}"></div>

</section></body>
</html>
