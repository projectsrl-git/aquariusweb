<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Storico contabile – Aquarius</title></head>
<body><section>

    <div th:replace="~{fragments/page-header :: pageHeader(
        icon='bi-clock-history',
        title='Storico contabile',
        subtitle='Mastrino di conto — esercizio ' + ${anno},
        crumbs=${breadcrumbs}
    )}"></div>

    <form method="get" th:action="@{/contabilita/storico}" class="mb-3" id="storicoForm" autocomplete="off">
        <div class="input-group position-relative" style="max-width:560px">
            <span class="input-group-text"><i class="bi bi-bank"></i></span>
            <!-- codice effettivo inviato al server -->
            <input type="hidden" name="conto" id="contoCode" th:value="${conto}">
            <!-- campo di ricerca live: codice o descrizione -->
            <input type="text" id="contoSearch" class="form-control"
                   th:value="${conto != null and conto != '' ? (conto + (accountName != null and accountName != '' ? ' — ' + accountName : '')) : ''}"
                   placeholder="Cerca per codice o descrizione…">
            <button type="submit" class="btn btn-primary">Visualizza mastrino</button>
            <!-- tendina risultati -->
            <ul id="contoResults" class="list-group position-absolute w-100 shadow"
                style="top:100%; z-index:1050; max-height:280px; overflow:auto; display:none;"></ul>
        </div>
        <div class="form-text">Digita almeno 2 caratteri: seleziona il conto dalla lista.</div>
    </form>

    <script th:inline="none">
    (function () {
        const ctx = (document.querySelector('meta[name=_ctx]')?.content || '/').replace(/\/$/, '');
        const search = document.getElementById('contoSearch');
        const code = document.getElementById('contoCode');
        const box = document.getElementById('contoResults');
        const form = document.getElementById('storicoForm');
        let timer = null, items = [], active = -1;

        function hide() { box.style.display = 'none'; active = -1; }
        function render() {
            if (!items.length) { hide(); return; }
            box.innerHTML = '';
            items.forEach((it, idx) => {
                const li = document.createElement('li');
                li.className = 'list-group-item list-group-item-action py-1';
                li.style.cursor = 'pointer';
                li.innerHTML = '<span class="font-monospace small fw-semibold">' + it.code +
                               '</span> <span class="text-muted small">' + (it.description || '') + '</span>';
                li.addEventListener('mousedown', (e) => { e.preventDefault(); pick(idx); });
                if (idx === active) li.classList.add('active');
                box.appendChild(li);
            });
            box.style.display = 'block';
        }
        function pick(idx) {
            const it = items[idx];
            if (!it) return;
            code.value = it.code;
            search.value = it.code + (it.description ? ' — ' + it.description : '');
            hide();
            form.submit();
        }
        async function query(q) {
            try {
                const res = await fetch(ctx + '/conti/autocomplete?q=' + encodeURIComponent(q),
                                        { credentials: 'same-origin' });
                if (!res.ok) { hide(); return; }
                items = await res.json();
                active = -1;
                render();
            } catch (e) { hide(); }
        }
        search.addEventListener('input', () => {
            const q = search.value.trim();
            // se l'utente riscrive, il codice selezionato non è più valido
            code.value = '';
            clearTimeout(timer);
            if (q.length < 2) { hide(); return; }
            timer = setTimeout(() => query(q), 200);
        });
        search.addEventListener('keydown', (e) => {
            if (box.style.display === 'none') return;
            if (e.key === 'ArrowDown') { e.preventDefault(); active = Math.min(active + 1, items.length - 1); render(); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); active = Math.max(active - 1, 0); render(); }
            else if (e.key === 'Enter' && active >= 0) { e.preventDefault(); pick(active); }
            else if (e.key === 'Escape') { hide(); }
        });
        document.addEventListener('click', (e) => { if (!form.contains(e.target)) hide(); });

        // Se l'utente digita un codice senza selezionare dalla lista, ricava
        // il codice dal testo (parte prima di " — ") così la ricerca funziona.
        form.addEventListener('submit', () => {
            if (!code.value) {
                const raw = (search.value || '').split(' — ')[0].trim();
                code.value = raw;
            }
        });
    })();
    </script>

    <div th:if="${ledger != null}">
        <div class="alert alert-light border d-flex justify-content-between align-items-center py-2">
            <span>
                <span class="font-monospace fw-bold" th:text="${conto}">01.05.001</span>
                <span class="text-muted ms-2" th:text="${accountName ?: ''}">Descrizione conto</span>
            </span>
            <span>Saldo finale:
                <span class="fw-bold font-monospace"
                      th:classappend="${finalBalance.signum() < 0 ? 'text-danger' : 'text-success'}"
                      th:text="${#numbers.formatDecimal(finalBalance,1,'POINT',2,'COMMA')}">0,00</span>
            </span>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-sm mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="width:100px">Data</th>
                                <th style="width:90px">N. Reg.</th>
                                <th>Descrizione</th>
                                <th style="width:120px" class="text-end">Dare</th>
                                <th style="width:120px" class="text-end">Avere</th>
                                <th style="width:130px" class="text-end">Saldo</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="l : ${ledger}">
                                <td class="small"><span th:replace="~{fragments/list-tools :: itDate(${l.mov.registrationDate})}">15/01/2026</span></td>
                                <td>
                                    <a th:href="@{/contabilita/primanota/{n}(n=${l.mov.registrationNo})}"
                                       class="font-monospace small text-decoration-none"
                                       th:text="${l.mov.registrationNo}">000123</a>
                                </td>
                                <td class="small" th:text="${l.mov.description ?: l.mov.shortDescription ?: ''}">—</td>
                                <td class="text-end font-monospace small"
                                    th:text="${l.dare.signum() != 0 ? #numbers.formatDecimal(l.dare,1,'POINT',2,'COMMA') : ''}"></td>
                                <td class="text-end font-monospace small"
                                    th:text="${l.avere.signum() != 0 ? #numbers.formatDecimal(l.avere,1,'POINT',2,'COMMA') : ''}"></td>
                                <td class="text-end font-monospace small fw-semibold"
                                    th:classappend="${l.runningBalance.signum() < 0 ? 'text-danger' : ''}"
                                    th:text="${#numbers.formatDecimal(l.runningBalance,1,'POINT',2,'COMMA')}">0,00</td>
                            </tr>
                            <tr th:if="${ledger.isEmpty()}">
                                <td colspan="6" class="text-center text-muted py-5">
                                    Nessun movimento per il conto <span th:text="${conto}"></span>.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${ledger == null}" class="text-muted small">
        <i class="bi bi-info-circle me-1"></i>Inserisci un codice conto per visualizzarne il mastrino.
    </div>

</section></body>
</html>
