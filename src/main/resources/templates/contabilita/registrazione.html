<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Registrazione – Aquarius</title></head>
<body><section>

    <div th:replace="~{fragments/page-header :: pageHeader(
        icon='bi-journal-text',
        title='Registrazione ' + ${nreg},
        subtitle=${header != null ? header.registrationDate : ''},
        crumbs=${breadcrumbs}
    )}"></div>

    <a th:href="@{/contabilita/primanota}" class="btn btn-outline-secondary btn-sm mb-3">
        <i class="bi bi-arrow-left me-1"></i>Torna alla primanota
    </a>

    <div th:if="${header != null}" class="card shadow-sm border-0 mb-3">
        <div class="card-body">
            <dl class="row mb-0 small">
                <dt class="col-2 text-muted">Documento</dt>
                <dd class="col-4" th:text="${header.documentNo ?: '—'}">—</dd>
                <dt class="col-2 text-muted">Data doc.</dt>
                <dd class="col-4"><span th:if="${header.documentDate}" th:replace="~{fragments/list-tools :: itDate(${header.documentDate})}">—</span><span th:unless="${header.documentDate}">—</span></dd>
                <dt class="col-2 text-muted">Descrizione</dt>
                <dd class="col-10" th:text="${header.description ?: '—'}">—</dd>
            </dl>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-header bg-white">
            <h6 class="detail-card-title"><i class="bi bi-list-columns me-1"></i>Righe (partita doppia)</h6>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-sm mb-0">
                    <thead class="table-light">
                        <tr>
                            <th style="width:110px">Conto</th>
                            <th>Descrizione conto</th>
                            <th>Descrizione riga</th>
                            <th style="width:130px" class="text-end">Dare</th>
                            <th style="width:130px" class="text-end">Avere</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${rows}">
                            <td class="font-monospace small" th:text="${r.account}">01.01.001</td>
                            <td class="small" th:text="${r.account != null ? (accountNames.get(r.account.trim()) ?: '') : ''}">Conto</td>
                            <td class="small text-muted" th:text="${r.description ?: r.shortDescription ?: ''}">—</td>
                            <td class="text-end font-monospace small"
                                th:text="${#strings.equalsIgnoreCase(r.movementType,'D') and r.amount != null ? #numbers.formatDecimal(r.amount,1,'POINT',2,'COMMA') : ''}"></td>
                            <td class="text-end font-monospace small"
                                th:text="${#strings.equalsIgnoreCase(r.movementType,'A') and r.amount != null ? #numbers.formatDecimal(r.amount,1,'POINT',2,'COMMA') : ''}"></td>
                        </tr>
                    </tbody>
                    <tfoot class="table-light">
                        <tr class="fw-bold">
                            <td colspan="3" class="text-end">Totali</td>
                            <td class="text-end font-monospace"
                                th:text="${#numbers.formatDecimal(totDare,1,'POINT',2,'COMMA')}">0,00</td>
                            <td class="text-end font-monospace"
                                th:text="${#numbers.formatDecimal(totAvere,1,'POINT',2,'COMMA')}">0,00</td>
                        </tr>
                        <tr th:if="${totDare.compareTo(totAvere) != 0}">
                            <td colspan="5" class="text-end text-danger small">
                                <i class="bi bi-exclamation-triangle me-1"></i>
                                Sbilancio: <span th:text="${#numbers.formatDecimal(totDare.subtract(totAvere),1,'POINT',2,'COMMA')}">0,00</span>
                            </td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

</section></body>
</html>
