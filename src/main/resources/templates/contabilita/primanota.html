<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Primanota – Aquarius</title></head>
<body><section>

    <div th:replace="~{fragments/page-header :: pageHeader(
        icon='bi-journal-text',
        title='Primanota',
        subtitle='Registrazioni contabili — esercizio ' + ${anno},
        crumbs=${breadcrumbs}
    )}"></div>

    <form method="get" th:action="@{/contabilita/primanota}" class="mb-3">
        <div class="input-group" style="max-width:600px">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" name="q" th:value="${q}" class="form-control"
                   placeholder="Numero registrazione, documento o descrizione…">
            <button type="submit" class="btn btn-primary">Cerca</button>
            <a th:href="@{/contabilita/primanota}" class="btn btn-outline-secondary" th:if="${q != null and q != ''}">
                <i class="bi bi-x"></i>
            </a>
        </div>
    </form>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-sm mb-0">
                    <thead class="table-light">
                        <tr>
                            <th style="width:90px">N. Reg.</th>
                            <th style="width:100px">Data reg.</th>
                            <th style="width:110px">Documento</th>
                            <th>Descrizione</th>
                            <th style="width:120px" class="text-end">Importo</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="m : ${registrations.content}">
                            <td>
                                <a th:href="@{/contabilita/primanota/{n}(n=${m.registrationNo})}"
                                   class="font-monospace small text-decoration-none"
                                   th:text="${m.registrationNo}">000123</a>
                            </td>
                            <td class="small" th:text="${m.registrationDate}">2026/01/15</td>
                            <td class="small font-monospace" th:text="${m.documentNo ?: '—'}">FT 42</td>
                            <td class="small" th:text="${m.description ?: m.shortDescription ?: '—'}">Descrizione</td>
                            <td class="text-end font-monospace small"
                                th:text="${m.amount != null ? #numbers.formatDecimal(m.amount,1,'POINT',2,'COMMA') : '—'}">0,00</td>
                        </tr>
                        <tr th:if="${registrations.empty}">
                            <td colspan="5" class="text-center text-muted py-5">
                                <i class="bi bi-inbox" style="font-size:2rem"></i>
                                <p class="mt-2 mb-0">Nessuna registrazione trovata.</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <nav th:if="${registrations.totalPages > 1}" class="mt-3">
        <ul class="pagination pagination-sm">
            <li class="page-item" th:classappend="${registrations.first ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/contabilita/primanota(q=${q}, page=${registrations.number - 1})}">«</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link"
                      th:text="${'Pagina ' + (registrations.number + 1) + ' di ' + registrations.totalPages + ' · ' + registrations.totalElements + ' righe'}">Pagina 1</span>
            </li>
            <li class="page-item" th:classappend="${registrations.last ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/contabilita/primanota(q=${q}, page=${registrations.number + 1})}">»</a>
            </li>
        </ul>
    </nav>

</section></body>
</html>
