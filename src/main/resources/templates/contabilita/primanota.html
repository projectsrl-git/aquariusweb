<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Primanota – Aquarius</title></head>
<body><section>

    <div th:replace="~{fragments/page-header :: pageHeader(
        icon='bi-journal-text',
        title='Primanota',
        subtitle='Registrazioni contabili — esercizio ' + ${anno},
        crumbs=${breadcrumbs}
    )}"></div>

    <!-- ─── Metriche di raggruppamento cliccabili ─────────────────────── -->
    <div class="row g-3 mb-3">
        <!-- Per periodo -->
        <div class="col-lg-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-white py-2">
                    <h6 class="detail-card-title mb-0"><i class="bi bi-calendar3 me-1"></i>Per periodo</h6>
                </div>
                <div class="card-body p-2" style="max-height:220px; overflow:auto">
                    <a th:each="p : ${metricPeriods}"
                       th:href="@{/contabilita/primanota(q=${p[0]})}"
                       class="d-flex justify-content-between text-decoration-none text-reset px-2 py-1 rounded metric-row">
                        <span class="small" th:text="${p[0]}">2026/06</span>
                        <span class="small font-monospace" th:text="${p[1]}">0,00</span>
                    </a>
                    <div th:if="${metricPeriods == null or metricPeriods.isEmpty()}"
                         class="text-muted small px-2 py-1">Nessun dato</div>
                </div>
            </div>
        </div>
        <!-- TOP 5 conti clienti/fornitori -->
        <div class="col-lg-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-white py-2">
                    <h6 class="detail-card-title mb-0"><i class="bi bi-people me-1"></i>TOP 5 clienti / fornitori</h6>
                </div>
                <div class="card-body p-2">
                    <a th:each="c : ${metricTopAccounts}"
                       th:href="@{/contabilita/storico(conto=${c[0]})}"
                       class="d-flex justify-content-between text-decoration-none text-reset px-2 py-1 rounded metric-row">
                        <span class="small text-truncate" style="max-width:65%"
                              th:text="${c[1] != null and c[1] != '' ? c[1] : c[0]}">Conto</span>
                        <span class="small font-monospace" th:text="${c[2]}">0,00</span>
                    </a>
                    <div th:if="${metricTopAccounts == null or metricTopAccounts.isEmpty()}"
                         class="text-muted small px-2 py-1">Nessun dato</div>
                </div>
            </div>
        </div>
        <!-- TOP 5 tipi operazione -->
        <div class="col-lg-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-white py-2">
                    <h6 class="detail-card-title mb-0"><i class="bi bi-tags me-1"></i>TOP 5 tipi operazione</h6>
                </div>
                <div class="card-body p-2">
                    <a th:each="o : ${metricTopOps}"
                       th:href="@{/contabilita/primanota(q=${o[0]})}"
                       class="d-flex justify-content-between text-decoration-none text-reset px-2 py-1 rounded metric-row">
                        <span class="small text-truncate" style="max-width:65%"
                              th:text="${o[1] != null and o[1] != '' ? (o[0] + ' · ' + o[1]) : o[0]}">TOP</span>
                        <span class="small font-monospace" th:text="${o[2]}">0,00</span>
                    </a>
                    <div th:if="${metricTopOps == null or metricTopOps.isEmpty()}"
                         class="text-muted small px-2 py-1">Nessun dato</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ─── Ricerca ───────────────────────────────────────────────────── -->
    <form method="get" th:action="@{/contabilita/primanota}" class="mb-3">
        <input type="hidden" name="size" th:value="${size}">
        <input type="hidden" name="sort" th:value="${sort}">
        <input type="hidden" name="dir" th:value="${dir}">
        <div class="input-group" style="max-width:600px">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" name="q" th:value="${q}" class="form-control"
                   placeholder="Numero registrazione, documento o descrizione…">
            <button type="submit" class="btn btn-primary">Cerca</button>
            <a th:href="@{/contabilita/primanota}" class="btn btn-outline-secondary" th:if="${q != null and q != ''}">
                <i class="bi bi-x"></i>
            </a>
        </div>
    </form>

    <!-- ─── Tabella registrazioni (una riga per registrazione) ────────── -->
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-sm mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/contabilita/primanota','registrationNo','N. Reg.',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/contabilita/primanota','registrationDate','Data reg.',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/contabilita/primanota','documentNo','Documento',${q},${size},${sort},${dir},'')}"></th>
                            <th>Descrizione</th>
                            <th>Tipo operazione</th>
                            <th>Conti coinvolti</th>
                            <th class="text-end">Importo</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${rows}">
                            <td>
                                <a th:href="@{/contabilita/primanota/{n}(n=${r.registrationNo})}"
                                   class="font-monospace small text-decoration-none"
                                   th:text="${r.registrationNo}">000123</a>
                            </td>
                            <td class="small">
                                <span th:replace="~{fragments/list-tools :: itDate(${r.registrationDate})}">15/01/2026</span>
                            </td>
                            <td class="small font-monospace" th:text="${r.documentNo ?: '—'}">FT 42</td>
                            <td class="small" th:text="${r.description ?: '—'}">Descrizione</td>
                            <td class="small">
                                <span th:if="${r.operationType != null and r.operationType != ''}">
                                    <span class="badge bg-info-subtle text-info-emphasis font-monospace"
                                          th:text="${r.operationType}">TOP</span>
                                    <span class="text-muted" th:text="${r.operationTypeDesc ?: ''}">descr</span>
                                </span>
                                <span th:unless="${r.operationType != null and r.operationType != ''}" class="text-muted">—</span>
                            </td>
                            <td>
                                <span th:each="acc : ${r.accounts}"
                                      class="badge bg-secondary-subtle text-secondary-emphasis me-1 mb-1"
                                      th:title="${acc[0]}"
                                      th:text="${acc[1] != null and acc[1] != '' ? acc[1] : acc[0]}">Conto</span>
                            </td>
                            <td class="text-end font-monospace small"
                                th:text="${r.amount != null ? #numbers.formatDecimal(r.amount,1,'POINT',2,'COMMA') : '—'}">0,00</td>
                        </tr>
                        <tr th:if="${rows == null or rows.isEmpty()}">
                            <td colspan="7" class="text-center text-muted py-5">
                                <i class="bi bi-inbox" style="font-size:2rem"></i>
                                <p class="mt-2 mb-0">Nessuna registrazione trovata.</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ─── Paginazione + righe per pagina ────────────────────────────── -->
    <div th:replace="~{fragments/list-tools :: pager('/contabilita/primanota',${pageObj != null ? pageObj.number : 0},${q},${size},${sort},${dir},${pageObj})}"></div>

    <style>
        .metric-row:hover { background: var(--bs-secondary-bg, #f1f3f5); }
    </style>

</section></body>
</html>
