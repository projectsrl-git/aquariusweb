<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Produzione standard – Aquarius</title></head>
<body><section>

    <div th:replace="~{fragments/page-header :: pageHeader(
        icon='bi-gear-wide-connected',
        title='Programmazione della produzione',
        subtitle='Programmi di produzione STANDARD (tabella PRODUZIONE, nodi radice tipo STD)',
        crumbs=${breadcrumbs}
    )}"></div>

    <form method="get" th:action="@{/produzione}" class="mb-3">
        <input type="hidden" name="size" th:value="${size}">
        <input type="hidden" name="sort" th:value="${sort}">
        <input type="hidden" name="dir" th:value="${dir}">
        <div class="input-group" style="max-width:600px">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" name="q" th:value="${q}" class="form-control"
                   placeholder="Numero programma, articolo o descrizione…">
            <button type="submit" class="btn btn-primary">Cerca</button>
            <a th:href="@{/produzione}" class="btn btn-outline-secondary" th:if="${q != null and q != ''}">
                <i class="bi bi-x"></i>
            </a>
        </div>
    </form>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-sm mb-0">
                    <thead class="table-light">
                        <tr>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/produzione','programNumber','Numero',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/produzione','programDate','Data',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/produzione','articleCode','Prodotto',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/produzione','quantity','Quantità',${q},${size},${sort},${dir},'text-end')}"></th>
                            <th>UM</th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/produzione','plannedStart','Inizio previsto',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/produzione','plannedEnd','Fine prevista',${q},${size},${sort},${dir},'')}"></th>
                            <th>Stato</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${programmi.content}">
                            <td>
                                <a th:href="@{/produzione/{id}(id=${p.id})}"
                                   class="font-monospace small text-decoration-none"
                                   th:text="${p.programNumber != null ? p.programNumber.trim() : ''}">000123</a>
                            </td>
                            <td class="small"><span th:replace="~{fragments/list-tools :: itDate(${p.programDate})}"></span></td>
                            <td>
                                <a th:href="@{/produzione/{id}(id=${p.id})}"
                                   class="text-decoration-none text-dark">
                                    <span class="font-monospace small" th:text="${p.articleCode != null ? p.articleCode.trim() : ''}"></span>
                                    <div class="small text-muted" th:text="${p.articleDescription ?: ''}"></div>
                                </a>
                            </td>
                            <td class="text-end font-monospace small"
                                th:text="${p.quantity != null ? #numbers.formatDecimal(p.quantity, 1, 'POINT', 2, 'COMMA') : '—'}">1,00</td>
                            <td class="small" th:text="${p.unit != null and !p.unit.trim().isEmpty() ? p.unit.trim() : '—'}">PZ</td>
                            <td class="small"><span th:replace="~{fragments/list-tools :: itDate(${p.plannedStart})}"></span></td>
                            <td class="small"><span th:replace="~{fragments/list-tools :: itDate(${p.plannedEnd})}"></span></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${p.statusLabel == 'Chiuso'} ? 'bg-secondary-subtle text-secondary-emphasis'
                                                    : (${p.statusLabel == 'Completato'} ? 'bg-success-subtle text-success-emphasis'
                                                    : (${p.statusLabel == 'In corso'} ? 'bg-primary-subtle text-primary-emphasis'
                                                    : 'bg-warning-subtle text-warning-emphasis'))"
                                      th:text="${p.statusLabel}">Pianificato</span>
                            </td>
                        </tr>
                        <tr th:if="${programmi.empty}">
                            <td colspan="8" class="text-center text-muted py-5">
                                <i class="bi bi-inbox" style="font-size:2rem"></i>
                                <p class="mt-2 mb-0">Nessun programma di produzione standard trovato.</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/list-tools :: pager('/produzione',${programmi.number},${q},${size},${sort},${dir},${programmi})}"></div>

</section></body>
</html>
