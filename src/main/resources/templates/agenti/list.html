<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Agenti – Aquarius</title></head>
<body><section>

    <div th:replace="~{fragments/page-header :: pageHeader(
        icon='bi-person-badge',
        title='Agenti',
        subtitle='Anagrafica agenti (tabella U_AGE_AN)',
        crumbs=${breadcrumbs}
    )}"></div>

    <form method="get" th:action="@{/agenti}" class="mb-3">
        <input type="hidden" name="size" th:value="${size}">
        <input type="hidden" name="sort" th:value="${sort}">
        <input type="hidden" name="dir" th:value="${dir}">
        <div class="input-group" style="max-width:600px">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" name="q" th:value="${q}" class="form-control"
                   placeholder="Codice, nome o località…">
            <button type="submit" class="btn btn-primary">Cerca</button>
            <a th:href="@{/agenti}" class="btn btn-outline-secondary" th:if="${q != null and q != ''}">
                <i class="bi bi-x"></i>
            </a>
        </div>
    </form>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-sm mb-0">
                    <thead class="table-light">
                        <tr>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/agenti','code','Codice',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/agenti','name','Nome',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/agenti','city','Località',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/agenti','province','Prov.',${q},${size},${sort},${dir},'')}"></th>
                            <th th:replace="~{fragments/list-tools :: sortableHeader('/agenti','commissionPct','% Provvigione',${q},${size},${sort},${dir},'text-end')}"></th>
                            <th>P. IVA</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="a : ${agenti.content}">
                            <td>
                                <a th:href="@{/agenti/{id}(id=${a.id})}"
                                   class="font-monospace small text-decoration-none"
                                   th:text="${a.code != null ? a.code.trim() : ''}">A01</a>
                            </td>
                            <td>
                                <a th:href="@{/agenti/{id}(id=${a.id})}"
                                   class="text-decoration-none text-dark"
                                   th:text="${a.name ?: '—'}">Mario Rossi</a>
                            </td>
                            <td class="small" th:text="${a.city != null and !a.city.trim().isEmpty() ? a.city.trim() : '—'}">—</td>
                            <td class="small" th:text="${a.province != null and !a.province.trim().isEmpty() ? a.province.trim() : '—'}">—</td>
                            <td class="text-end font-monospace small"
                                th:text="${a.commissionPct != null ? #numbers.formatDecimal(a.commissionPct, 1, 'POINT', 2, 'COMMA') + ' %' : '—'}">—</td>
                            <td class="font-monospace small" th:text="${a.vatNumber != null and !a.vatNumber.trim().isEmpty() ? a.vatNumber.trim() : '—'}">—</td>
                        </tr>
                        <tr th:if="${agenti.empty}">
                            <td colspan="6" class="text-center text-muted py-5">
                                <i class="bi bi-inbox" style="font-size:2rem"></i>
                                <p class="mt-2 mb-0">Nessun agente trovato.</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/list-tools :: pager('/agenti',${agenti.number},${q},${size},${sort},${dir},${agenti})}"></div>

</section></body>
</html>
