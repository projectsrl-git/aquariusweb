# ════════════════════════════════════════════════════════════════════════
#  Aquarius — Web edition
#  Configurazione multi-tenant: 1 SYSTEM DB centrale + N TENANT DBs

# ─── METADATA APP ────────────────────────────────────────────────────────
# Risolti a build-time da Maven resource filtering (vedi pom.xml).
# Esposti in runtime via AppVersionService.
app.version=@project.version@
app.build-time=@maven.build.timestamp@
# ════════════════════════════════════════════════════════════════════════

# ─── SERVER ──────────────────────────────────────────────────────────────
server.port=8080
spring.application.name=AquariusWeb

# ─── SYSTEM DATASOURCE ──────────────────────────────────────────────────
# Contiene metadata multi-tenant: tabella tenants + super_admins.
# In dev: H2 file-based (persistente fra riavvii, niente setup esterno).
# In prod: spostare su SQL Server / Postgres dedicato.
aquarius.system.datasource.url=jdbc:h2:file:./data/aquarius_system;MODE=MSSQLServer;DB_CLOSE_ON_EXIT=FALSE
aquarius.system.datasource.username=sa
aquarius.system.datasource.password=
aquarius.system.datasource.driver-class-name=org.h2.Driver

# ─── TENANT DATASOURCES ─────────────────────────────────────────────────
# Una entry per ogni società. La chiave (es. "impresind") diventa il tenant id
# usato dal TenantRoutingDataSource e visualizzato nella combobox di login.
#
# IMPORTANTE: in produzione le credenziali NON vanno in chiaro qui.
# Spostarle in variabili d'ambiente o secret store (Vault, AWS Secrets Manager).
# Esempio: aquarius.tenants.impresind.password=${IMPRESIND_DB_PWD}

# Tenant 1 — Impresind
aquarius.tenants.impresind.name=Impresind
aquarius.tenants.impresind.url=${IMPRESIND_DB_URL:jdbc:jtds:sqlserver://192.168.50.35:1433/IMPRESIND_TEST}
aquarius.tenants.impresind.username=${IMPRESIND_DB_USER:sviluppo}
aquarius.tenants.impresind.password=${IMPRESIND_DB_PWD:sviluppo}
aquarius.tenants.impresind.driver-class-name=net.sourceforge.jtds.jdbc.Driver

# Tenant 2 — Tremonti
#
# TEMPORANEO: puntiamo allo stesso DB fisico di Impresind (IMPRESIND_TEST) per
# poter testare il routing del tenant. La selezione "Tremonti" nella combobox
# di login funzionerà a livello applicativo (TenantContext, sidebar, ecc.) ma
# vedrai gli stessi dati di Impresind perché il DB è lo stesso.
# Quando avrai un DB Tremonti reale, basta valorizzare TREMONTI_DB_URL nell'env
# (o cambiare il default qui sotto) per separare i due tenant fisicamente.
aquarius.tenants.tremonti.name=Tremonti
aquarius.tenants.tremonti.url=${TREMONTI_DB_URL:jdbc:jtds:sqlserver://192.168.50.35:1433/IMPRESIND_TEST}
aquarius.tenants.tremonti.username=${TREMONTI_DB_USER:sviluppo}
aquarius.tenants.tremonti.password=${TREMONTI_DB_PWD:sviluppo}
aquarius.tenants.tremonti.driver-class-name=net.sourceforge.jtds.jdbc.Driver

# Tenant preselezionato nella combobox di login
aquarius.default-tenant=impresind

# ─── JPA / HIBERNATE per i tenant ───────────────────────────────────────
aquarius.tenant.jpa.database-platform=org.hibernate.dialect.SQLServer2012Dialect
# "none": Hibernate NON valida lo schema all'avvio. Best-effort: se un tenant
# DB è irraggiungibile l'app parte ugualmente, le query falliranno solo quando
# qualcuno proverà a usarlo.
# Lo schema delle tabelle aq_web_* è creato da Flyway (vedi TenantFlywayMigrator).
# Le tabelle legacy le diamo per esistenti.
aquarius.tenant.jpa.hibernate.ddl-auto=none
aquarius.tenant.jpa.show-sql=false
aquarius.tenant.jpa.properties.hibernate.format_sql=true

# HikariCP: query di validazione (raccomandato con jTDS)
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# ─── THYMELEAF ──────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ─── FLYWAY ─────────────────────────────────────────────────────────────
# Spring Boot Flyway autoconfig è DISABILITATA (vedi AquariusApplication)
# perché abbiamo pinnato Flyway a 7.15.0 (l'ultima versione Community che
# supporta SQL Server 2008/2012).
#
# Le migrazioni sono orchestrate da:
#   - SystemFlywayMigrator → db/migration/system → SYSTEM DB (H2)
#   - TenantFlywayMigrator → db/migration/tenant → per ogni tenant configurato
#
# Convenzione naming: V<numero>__<descrizione>.sql, versioni crescenti.

# ─── LOGGING ────────────────────────────────────────────────────────────
logging.file.name=logs/aquarius.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.level.com.aquarius=DEBUG
# Logging DEBUG temporaneo per diagnosticare problemi di autorizzazione.
# Tornaa a INFO quando il login funziona stabilmente.
logging.level.org.springframework.security=DEBUG

# ─── DEV CONVENIENCE ────────────────────────────────────────────────────
# Niente seed automatico: tutto passa da Flyway (vedi sopra).
# Il super-admin di default 'admin' (password: 'admin') è creato da
# db/migration/system/V2__seed_initial_tenants.sql.
# Le credenziali web di un operatore legacy 'admin' sono create da
# db/migration/tenant/V2__bootstrap_web_credentials_for_admin.sql se
# l'utente legacy esiste in res_oper.
