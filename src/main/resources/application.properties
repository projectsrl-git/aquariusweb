# ============================================================================
#  AquariusWeb -- configuration
#  Multi-tenant layout: 1 central SYSTEM DB + N legacy TENANT DBs.
#
#  DEPLOYMENT MODEL: WAR under external Tomcat 9. There is no server.port
#  here -- the HTTP connector belongs to Tomcat. For local development use
#  `mvn spring-boot:run` (embedded Tomcat, provided scope, default port 8080).
#
#  SECRETS POLICY (public repository): this file contains NO real hosts or
#  credentials. Every sensitive value is an ${ENV_VAR:placeholder}. Provide
#  real values via:
#    - environment variables (Tomcat: CATALINA_BASE/bin/setenv.bat|sh), or
#    - an untracked local override file (see spring.config.import below).
# ============================================================================

# --- APP METADATA -----------------------------------------------------------
# Resolved at build time by Maven resource filtering (see pom.xml),
# exposed at runtime by AppVersionService.
app.version=@project.version@
app.build-time=@maven.build.timestamp@

spring.application.name=AquariusWeb

# --- LOCAL OVERRIDES (untracked) ---------------------------------------------
# Optional file for machine-specific settings (real DB URLs, credentials).
# It is gitignored. Path is relative to the JVM working directory; under
# Tomcat prefer plain environment variables in setenv.
spring.config.import=optional:file:./config/application-local.properties

# --- HOME DIRECTORY -----------------------------------------------------------
# Base directory for runtime artifacts (H2 system DB files, logs).
# Default "." = JVM working directory. Under Tomcat set it explicitly, e.g.:
#   set "CATALINA_OPTS=-DAQUARIUSWEB_HOME=C:\aquariusweb"
# (referenced below via ${AQUARIUSWEB_HOME:.})

# --- SYSTEM DATASOURCE --------------------------------------------------------
# Holds multi-tenant metadata: tenants table + super_admins + web credentials.
# Dev: file-based H2 (persistent across restarts, zero external setup).
# Prod: move to a dedicated SQL Server / Postgres when needed.
aquarius.system.datasource.url=jdbc:h2:file:${AQUARIUSWEB_HOME:.}/data/aquarius_system;MODE=MSSQLServer;DB_CLOSE_ON_EXIT=FALSE
aquarius.system.datasource.username=sa
aquarius.system.datasource.password=
aquarius.system.datasource.driver-class-name=org.h2.Driver

# --- TENANT DATASOURCES -------------------------------------------------------
# One entry per company. The key (e.g. "impresind") becomes the tenant id used
# by TenantRoutingDataSource and shown in the login combobox.
# All values are env-var driven; the defaults below are NON-FUNCTIONAL
# placeholders on purpose (public repository).

# Tenant 1 -- Impresind
aquarius.tenants.impresind.name=Impresind
aquarius.tenants.impresind.url=${IMPRESIND_DB_URL:jdbc:jtds:sqlserver://localhost:1433/CHANGE_ME}
aquarius.tenants.impresind.username=${IMPRESIND_DB_USER:CHANGE_ME}
aquarius.tenants.impresind.password=${IMPRESIND_DB_PWD:CHANGE_ME}
aquarius.tenants.impresind.driver-class-name=net.sourceforge.jtds.jdbc.Driver

# Tenant 2 -- Tremonti
# NOTE: until a real Tremonti DB exists, point TREMONTI_DB_URL at the same
# physical DB as Impresind to exercise the tenant routing. The "Tremonti"
# selection then works at application level (TenantContext, sidebar) while
# showing the same data.
aquarius.tenants.tremonti.name=Tremonti
aquarius.tenants.tremonti.url=${TREMONTI_DB_URL:jdbc:jtds:sqlserver://localhost:1433/CHANGE_ME}
aquarius.tenants.tremonti.username=${TREMONTI_DB_USER:CHANGE_ME}
aquarius.tenants.tremonti.password=${TREMONTI_DB_PWD:CHANGE_ME}
aquarius.tenants.tremonti.driver-class-name=net.sourceforge.jtds.jdbc.Driver

# Tenant preselected in the login combobox
aquarius.default-tenant=impresind

# --- JPA / HIBERNATE (tenant side) ---------------------------------------------
aquarius.tenant.jpa.database-platform=org.hibernate.dialect.SQLServer2012Dialect
# "none": Hibernate does NOT validate the schema at startup. Best effort: if a
# tenant DB is unreachable the app still starts; queries fail only when someone
# actually uses that tenant.
# aq_web_* tables are created by the custom SqlMigrationRunner (see below).
# Legacy tables are assumed to exist and are NEVER touched (plug&play rule).
aquarius.tenant.jpa.hibernate.ddl-auto=none
aquarius.tenant.jpa.show-sql=false
aquarius.tenant.jpa.properties.hibernate.format_sql=true

# HikariCP: validation query (recommended with jTDS, which has no isValid())
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# --- THYMELEAF ------------------------------------------------------------------
# Dev convenience; set to true in production for template caching.
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# --- SCHEMA MIGRATIONS ------------------------------------------------------------
# NOT Flyway: Flyway Community >= 7 dropped SQL Server 2008/2012 support.
# Migrations are orchestrated by a small custom runner:
#   - SystemMigrationsConfig  -> db/migration/system  -> SYSTEM DB (H2)
#   - TenantMigrationsRunner  -> db/migration/tenant  -> each configured tenant
# Naming convention: V<number>__<description>.sql, ascending versions,
# recorded in a history table (see config/SqlMigrationRunner).

# --- LOGGING -----------------------------------------------------------------------
logging.file.name=${AQUARIUSWEB_HOME:.}/logs/aquarius.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.level.com.aquarius=DEBUG
logging.level.org.springframework.security=INFO

# --- BOOTSTRAP NOTES ----------------------------------------------------------------
# No automatic seeding outside migrations:
#   - default super-admin 'admin' (password 'admin') is created by
#     db/migration/system/V2__seed_initial_tenants.sql;
#   - web credentials for a legacy 'admin' operator are bootstrapped by
#     db/migration/tenant/V2__bootstrap_web_credentials_for_admin.sql
#     if that operator exists in res_oper.
