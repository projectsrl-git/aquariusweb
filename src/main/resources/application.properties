# ============================================================================
#  AquariusWeb -- common configuration (environment-agnostic)
#
#  This file is FILTERED by Maven at build time: @placeholders@ are replaced
#  with values from the active Maven profile (-Pdev|-Psit|-Puat|-Pprod).
#  Spring Boot uses @...@ for Maven filtering to avoid clashing with its own
#  ${...} runtime resolution.
#
#  WHERE SECRETS LIVE (never in this file, never in git):
#    Tenant DB URLs + credentials are per-environment and are read from
#      config/application-<env>.properties
#    which is gitignored and imported below via spring.config.import. Copy the
#    matching *.template once, fill it in, done. Maven picks the right file
#    based on the profile you build with.
# ============================================================================

# --- BUILD-TIME METADATA (filtered by Maven) --------------------------------
app.version=@project.version@
app.build-time=@maven.build.timestamp@
app.commit=@git.commit.id.abbrev@
spring.application.name=AquariusWeb

# --- ACTIVE ENVIRONMENT (filtered by Maven profile) -------------------------
# @env.name@ = dev|sit|uat|prod, injected by the active Maven profile.
spring.profiles.active=@env.name@

# --- HOME DIRECTORY (filtered by Maven profile) -----------------------------
# Default base dir for runtime artifacts (H2 system DB, logs). Can still be
# overridden at runtime with -DAQUARIUSWEB_HOME=... (env var wins over this).
aquarius.home=@aquariusweb.home@

# --- SECRETS IMPORT (per environment, gitignored) ---------------------------
# Loads config/application-<active-profile>.properties from the working dir.
# "optional:" means the app still starts if the file is missing (you'll just
# get placeholder DB values and connections will fail on use).
spring.config.import=optional:file:./config/application-${spring.profiles.active}.properties

# --- SYSTEM DATASOURCE (H2, non-sensitive, same everywhere) -----------------
aquarius.system.datasource.url=jdbc:h2:file:${AQUARIUSWEB_HOME:${aquarius.home}}/data/aquarius_system;MODE=MSSQLServer;DB_CLOSE_ON_EXIT=FALSE
aquarius.system.datasource.username=sa
aquarius.system.datasource.password=
aquarius.system.datasource.driver-class-name=org.h2.Driver

# --- TENANT DATASOURCES -----------------------------------------------------
# Names are non-sensitive and live here. URLs, usernames and passwords are
# environment-specific and come from config/application-<env>.properties
# (see the *.template files). The defaults below are NON-FUNCTIONAL
# placeholders so a missing secrets file fails loudly, not silently.
aquarius.tenants.impresind.name=Impresind
aquarius.tenants.impresind.url=${IMPRESIND_DB_URL:CHANGE_ME}
aquarius.tenants.impresind.username=${IMPRESIND_DB_USER:CHANGE_ME}
aquarius.tenants.impresind.password=${IMPRESIND_DB_PWD:CHANGE_ME}
aquarius.tenants.impresind.driver-class-name=net.sourceforge.jtds.jdbc.Driver

aquarius.tenants.tremonti.name=Tremonti
aquarius.tenants.tremonti.url=${TREMONTI_DB_URL:CHANGE_ME}
aquarius.tenants.tremonti.username=${TREMONTI_DB_USER:CHANGE_ME}
aquarius.tenants.tremonti.password=${TREMONTI_DB_PWD:CHANGE_ME}
aquarius.tenants.tremonti.driver-class-name=net.sourceforge.jtds.jdbc.Driver

aquarius.default-tenant=impresind

# --- JPA / HIBERNATE (tenant side) ------------------------------------------
aquarius.tenant.jpa.database-platform=org.hibernate.dialect.SQLServer2012Dialect
aquarius.tenant.jpa.hibernate.ddl-auto=none
aquarius.tenant.jpa.show-sql=false
aquarius.tenant.jpa.properties.hibernate.format_sql=true

# HikariCP (jTDS has no isValid(): a validation query is recommended)
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# --- THYMELEAF --------------------------------------------------------------
# Overridden per environment (false in dev for hot reload, true elsewhere).
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8

# --- LOGGING ----------------------------------------------------------------
# Logging is driven by logback-spring.xml. The log directory is configurable
# and defaults per environment (see application-<env>.properties, which set
# aquarius.log.dir). An env var or -Daquarius.log.dir=... overrides it.
# Files: <dir>/aquarius.log (current) + rotated archives (daily + by size,
# kept 90 days, capped total). See logback-spring.xml.
aquarius.log.dir=${AQUARIUS_LOG_DIR:${AQUARIUSWEB_HOME:${aquarius.home}}/logs}
# Base levels; a profile file may raise/lower them.
logging.level.com.aquarius=INFO
logging.level.org.springframework.security=INFO
